<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KredTidy CMS</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root, [data-theme="dark-green"] {
  --bg: #0a0a0a;
  --card-bg: #141414;
  --card-bg-alt: #1a1a1a;
  --border: #222;
  --border-2: #2a2a2a;
  --border-3: #333;
  --accent: #20ff20;
  --accent-light: rgba(32,255,32,0.12);
  --text: #e0e0e0;
  --text-body: #ccc;
  --text-sec: #aaa;
  --text-tert: #888;
  --text-dim: #666;
  --text-muted: #555;
  --text-quote: #999;
  --modal-bg: #111;
  --img-bg: #1a1a1a;
  --modimg-bg: #0a0a0a;
  --btn-bg: #141414;
  --btn-color: #aaa;
  --toggle-bg: #333;
  --toggle-border: #444;
  --toggle-dot: #888;
  --meta-bg: #1a1a1a;
  --meta-border: #2a2a2a;
  --meta-color: #888;
  --text-inverse: #000;
  --play-bg: rgba(0,0,0,0.7);
  --play-border: #fff;
  --admin-bg: #0d0d0d;
  --danger: #ff4444;
  --danger-hover: #ff6666;
  --input-bg: #1a1a1a;
  --input-border: #333;
  --input-focus: #20ff20;
}

[data-theme="light"] {
  --bg: #f5f5f5;
  --card-bg: #fff;
  --card-bg-alt: #f0f0f0;
  --border: #ddd;
  --border-2: #e0e0e0;
  --border-3: #ccc;
  --accent: #111;
  --accent-light: rgba(0,0,0,0.06);
  --text: #222;
  --text-body: #333;
  --text-sec: #666;
  --text-tert: #888;
  --text-dim: #999;
  --text-muted: #aaa;
  --text-quote: #777;
  --modal-bg: #fff;
  --img-bg: #eee;
  --modimg-bg: #f0f0f0;
  --btn-bg: #f0f0f0;
  --btn-color: #555;
  --toggle-bg: #ddd;
  --toggle-border: #ccc;
  --toggle-dot: #999;
  --meta-bg: #f0f0f0;
  --meta-border: #ddd;
  --meta-color: #666;
  --text-inverse: #fff;
  --play-bg: rgba(0,0,0,0.5);
  --play-border: #fff;
  --admin-bg: #fafafa;
  --danger: #cc0000;
  --danger-hover: #ee0000;
  --input-bg: #fff;
  --input-border: #ddd;
  --input-focus: #111;
}

[data-theme="dark-blue"] {
  --bg: #060d17;
  --card-bg: #0d1a2d;
  --card-bg-alt: #122540;
  --border: #1a3350;
  --border-2: #204060;
  --border-3: #255080;
  --accent: #40a0ff;
  --accent-light: rgba(64,160,255,0.12);
  --text: #d8e6f4;
  --text-body: #b8d0e8;
  --text-sec: #88a8c8;
  --text-tert: #6a8aab;
  --text-dim: #557390;
  --text-muted: #446080;
  --text-quote: #7a9ab8;
  --modal-bg: #0d1a2d;
  --img-bg: #122540;
  --modimg-bg: #060d17;
  --btn-bg: #0d1a2d;
  --btn-color: #88a8c8;
  --toggle-bg: #1a3350;
  --toggle-border: #204060;
  --toggle-dot: #6a8aab;
  --meta-bg: #122540;
  --meta-border: #204060;
  --meta-color: #6a8aab;
  --text-inverse: #000;
  --play-bg: rgba(0,0,0,0.7);
  --play-border: #fff;
  --admin-bg: #08111f;
  --danger: #ff5555;
  --danger-hover: #ff7777;
  --input-bg: #0d1a2d;
  --input-border: #1a3350;
  --input-focus: #40a0ff;
}

[data-theme="light-blue"] {
  --bg: #f0f5fa;
  --card-bg: #fff;
  --card-bg-alt: #e8f0f8;
  --border: #d0dae8;
  --border-2: #c5d3e5;
  --border-3: #b0c0d8;
  --accent: #2a70cc;
  --accent-light: rgba(42,112,204,0.1);
  --text: #1a2a3a;
  --text-body: #2a3a4a;
  --text-sec: #556880;
  --text-tert: #778899;
  --text-dim: #8899aa;
  --text-muted: #99aabb;
  --text-quote: #667788;
  --modal-bg: #fff;
  --img-bg: #e8f0f8;
  --modimg-bg: #f0f5fa;
  --btn-bg: #e8f0f8;
  --btn-color: #556880;
  --toggle-bg: #d0dae8;
  --toggle-border: #c5d3e5;
  --toggle-dot: #8899aa;
  --meta-bg: #e8f0f8;
  --meta-border: #d0dae8;
  --meta-color: #556880;
  --text-inverse: #fff;
  --play-bg: rgba(0,0,0,0.5);
  --play-border: #fff;
  --admin-bg: #e8f0f8;
  --danger: #cc2222;
  --danger-hover: #ee3333;
  --input-bg: #fff;
  --input-border: #d0dae8;
  --input-focus: #2a70cc;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, sans-serif;
  min-height: 100vh;
}

.header {
  max-width: 1400px;
  margin: 0 auto;
  padding: 32px 24px 16px;
}

.header h1 {
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--accent);
}

.header .desc { color: var(--text-tert); margin-top: 4px; font-size: 0.95rem; }
.header .total { color: var(--text-muted); font-size: 0.85rem; margin-top: 2px; }

.controls {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-top: 10px;
  flex-wrap: wrap;
}

.controls label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.82rem;
  color: var(--text-tert);
  cursor: pointer;
}

.theme-select {
  padding: 4px 8px;
  border: 1px solid var(--border-3);
  border-radius: 5px;
  background: var(--card-bg);
  color: var(--text-sec);
  font-size: 0.78rem;
  font-family: inherit;
  cursor: pointer;
  outline: none;
}

.theme-select:focus { border-color: var(--accent); }

.controls input[type="checkbox"] {
  appearance: none;
  width: 36px; height: 20px;
  border-radius: 10px;
  background: var(--toggle-bg);
  border: 1px solid var(--toggle-border);
  cursor: pointer;
  position: relative;
  transition: background 0.2s;
  flex-shrink: 0;
}

.controls input[type="checkbox"]::after {
  content: '';
  position: absolute;
  top: 2px; left: 2px;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--toggle-dot);
  transition: transform 0.2s, background 0.2s;
}

.controls input[type="checkbox"]:checked {
  background: var(--accent);
  border-color: var(--accent);
}

.controls input[type="checkbox"]:checked::after {
  transform: translateX(16px);
  background: var(--text-inverse);
}

.controls .mode-label { font-size: 0.8rem; color: var(--text-dim); }
.controls .mode-label .active { color: var(--accent); font-weight: 600; }

.admin-btn {
  padding: 4px 12px; border: 1px solid var(--border-3);
  border-radius: 5px; background: var(--card-bg);
  color: var(--text-sec); cursor: pointer;
  font-size: 0.78rem; transition: all 0.15s;
  font-family: inherit;
}
.admin-btn:hover { border-color: var(--accent); color: var(--accent); }
.admin-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

.import-btn {
  padding: 4px 12px; border: 1px solid var(--border-3);
  border-radius: 5px; background: var(--card-bg);
  color: var(--text-sec); cursor: pointer;
  font-size: 0.78rem; transition: all 0.15s;
  font-family: inherit;
}
.import-btn:hover { border-color: var(--accent); color: var(--accent); }

.grid {
  position: relative;
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 24px 24px;
}

#sentinel {
  position: absolute;
  width: 100%; height: 1px;
  left: 0;
  pointer-events: none;
}

.tile {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s;
  cursor: pointer;
  box-sizing: border-box;
}

.tile:hover {
  border-color: var(--accent);
  box-shadow: 0 2px 12px var(--accent-light);
}

.tile-img {
  width: 100%;
  display: block;
  background: var(--img-bg);
}

.tile-media-wrap { position: relative; line-height: 0; }

.tile-play {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 48px; height: 48px;
  background: var(--play-bg);
  border: 2px solid var(--play-border);
  border-radius: 50%;
  pointer-events: none;
  z-index: 2;
}

.tile-play::after {
  content: '';
  position: absolute;
  top: 50%; left: 55%;
  transform: translate(-50%, -50%);
  border-left: 14px solid var(--play-border);
  border-top: 9px solid transparent;
  border-bottom: 9px solid transparent;
}

.tile-body { padding: 12px 14px 14px; }

.tile-title {
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--accent);
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.tile-text {
  font-size: 0.82rem;
  color: var(--text-sec);
  margin-top: 6px;
  line-height: 1.45;
  display: -webkit-box;
  -webkit-line-clamp: 4;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.tile-text p { margin-bottom: 4px; }

.tile-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 10px;
  font-size: 0.72rem;
  color: var(--text-muted);
}

.tile-date { color: var(--text-muted); }

.tile-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }

.tile-tag {
  font-size: 0.68rem;
  padding: 2px 6px;
  border-radius: 4px;
  background: var(--card-bg-alt);
  color: var(--text-dim);
  border: 1px solid var(--border-2);
}

.tile-permalink {
  position: absolute;
  bottom: 8px; right: 8px;
  background: var(--play-bg);
  border: 1px solid var(--accent);
  color: var(--accent);
  font-size: 0.65rem;
  padding: 3px 7px;
  border-radius: 4px;
  opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
}

.tile:hover .tile-permalink { opacity: 1; }

.tile .tile-inner {
  color: inherit;
  text-decoration: none;
  display: block;
  position: relative;
}

.tile-edit-btn {
  position: absolute;
  top: 6px; right: 6px;
  background: var(--play-bg);
  border: 1px solid var(--accent);
  color: var(--accent);
  font-size: 0.65rem;
  padding: 2px 6px;
  border-radius: 4px;
  cursor: pointer;
  z-index: 5;
  opacity: 0;
  transition: opacity 0.2s;
}
.tile:hover .tile-edit-btn { opacity: 1; }

.text-only .grid { margin: 0; max-width: none; padding: 0 24px 24px; }
.text-only .grid .tile {
  position: static; width: 100%; background: transparent; border: none;
  border-bottom: 1px solid var(--border); border-radius: 0;
  padding: 14px 4px 12px; overflow: visible;
  font-family: "SF Mono", Consolas, monospace; font-size: 0.82rem; line-height: 1.5; cursor: pointer;
}
.text-only .grid .tile:hover { border-color: var(--accent); box-shadow: none; background: var(--card-bg); }
.text-only .tile-media-wrap, .text-only .tile-img { display: none; }
.text-only .tile-body { padding: 0; }
.text-only .tile-title { display: inline; font-size: 0.85rem; color: var(--accent); font-weight: 600; -webkit-line-clamp: unset; }
.text-only .tile-meta { display: inline; margin-top: 0; font-size: 0.72rem; }
.text-only .tile-meta::before { content: " "; }
.text-only .tile-date { color: var(--text-dim); }
.text-only .tile-text { display: block; margin-top: 4px; font-size: 0.78rem; color: var(--text-sec); -webkit-line-clamp: 3; }
.text-only .tile-tags { margin-top: 4px; }

.pagination {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  max-width: 1400px;
  margin: 24px auto 48px;
  padding: 0 24px;
  flex-wrap: wrap;
}

.pagination button,
.pagination .page-btn {
  padding: 8px 16px;
  border: 1px solid var(--border-3);
  border-radius: 6px;
  background: var(--btn-bg);
  color: var(--btn-color);
  cursor: pointer;
  font-size: 0.85rem;
  transition: all 0.15s;
}

.pagination button:hover:not(:disabled),
.pagination .page-btn:hover:not(.current) {
  border-color: var(--accent);
  color: var(--accent);
}

.pagination button:disabled { opacity: 0.3; cursor: default; }

.pagination .page-btn.current {
  background: var(--accent);
  color: var(--text-inverse);
  border-color: var(--accent);
  font-weight: 600;
}

.loading { text-align: center; padding: 80px 24px; color: var(--text-muted); }

.loading::after {
  content: '';
  display: inline-block;
  width: 24px; height: 24px;
  border: 2px solid var(--border-3);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin-left: 8px;
  vertical-align: middle;
}

@keyframes spin { to { transform: rotate(360deg); } }

.empty { text-align: center; padding: 80px 24px; color: var(--text-muted); font-size: 0.95rem; }

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.2s, visibility 0.2s;
}

.modal-overlay.open { opacity: 1; visibility: visible; }

.modal-content {
  background: var(--modal-bg);
  border: 1px solid var(--border-3);
  border-radius: 12px;
  max-width: 720px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  position: relative;
  padding: 32px;
}

.modal-close {
  position: absolute;
  top: 12px; right: 16px;
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 1.5rem;
  cursor: pointer;
  transition: color 0.15s;
  line-height: 1;
}

.modal-close:hover { color: var(--accent); }

.modal-head { margin-bottom: 20px; padding-right: 32px; }

.modal-head .modal-title {
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--accent);
  line-height: 1.3;
}

.modal-head .modal-date { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }

.modal-head .modal-meta {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 6px;
  font-size: 0.78rem;
}

.modal-head .modal-meta span {
  background: var(--meta-bg);
  border: 1px solid var(--meta-border);
  padding: 2px 8px;
  border-radius: 4px;
  color: var(--meta-color);
}

.modal-img {
  width: 100%;
  max-height: 70vh;
  object-fit: contain;
  display: block;
  margin: 0 auto 20px;
  border-radius: 6px;
  background: var(--modimg-bg);
}

.modal-body {
  font-size: 0.95rem;
  line-height: 1.6;
  color: var(--text-body);
}

.modal-body p { margin-bottom: 12px; }
.modal-body ul, .modal-body ol { margin: 8px 0 12px 24px; }
.modal-body li { margin-bottom: 4px; }
.modal-body a { color: var(--accent); }
.modal-body img { max-width: 100%; border-radius: 6px; margin: 8px 0; }
.modal-body blockquote {
  border-left: 2px solid var(--border-3);
  margin: 12px 0;
  padding-left: 16px;
  color: var(--text-quote);
}
.modal-body h1, .modal-body h2, .modal-body h3 { color: var(--text); margin: 16px 0 8px; }
.modal-body hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
.modal-body iframe {
  max-width: 100%;
  aspect-ratio: 16/9;
  height: auto;
  border: none;
  border-radius: 6px;
  margin: 8px 0;
  display: block;
}

.modal-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}

.modal-tags span {
  font-size: 0.78rem;
  padding: 4px 10px;
  border-radius: 4px;
  background: var(--meta-bg);
  border: 1px solid var(--meta-border);
  color: var(--meta-color);
}

.modal-footer {
  margin-top: 20px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
}

.modal-footer button {
  font-size: 0.82rem;
  color: var(--accent);
  background: transparent;
  border: 1px solid var(--accent);
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
}

.modal-footer button:hover { background: var(--accent); color: var(--text-inverse); }

.modal-footer button.danger { border-color: var(--danger); color: var(--danger); }
.modal-footer button.danger:hover { background: var(--danger); color: #fff; }

@media (max-width: 800px) {
  .modal-content { padding: 24px 20px; }
  .modal-head .modal-title { font-size: 1.1rem; }
  .header { padding: 24px 16px 12px; }
  .header h1 { font-size: 1.4rem; }
}

/* Terminal styles */
.term-btn {
  padding: 4px 12px; border: 1px solid var(--border-3);
  border-radius: 5px; background: var(--card-bg);
  color: var(--text-sec); cursor: pointer;
  font-size: 0.78rem; font-family: "SF Mono", Consolas, monospace;
  transition: all 0.15s;
}
.term-btn:hover { border-color: var(--accent); color: var(--accent); }

.toverlay { position:fixed; inset:0; z-index:2000; background:rgba(0,0,0,0.92); display:none; align-items:center; justify-content:center; padding:8px; }
.toverlay.open { display:flex; }

.twindow { width:100%; max-width:960px; height:85vh; height:85dvh; background:#0c0c0c; border:1px solid #333; border-radius:8px; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 0 60px rgba(32,255,32,0.08); }

.ttbar { background:#1a1a1a; padding:8px 14px; display:flex; align-items:center; font-family:"SF Mono",Consolas,monospace; font-size:0.75rem; color:#777; border-bottom:1px solid #2a2a2a; user-select:none; }
.ttbar span { flex:1; }
.ttbar .tclose { background:none; border:none; color:#666; cursor:pointer; font-size:1.2rem; line-height:1; padding:0 4px; }
.ttbar .tclose:hover { color:#ff5f57; }

.tbody { flex:1; overflow-y:auto; padding:10px 16px; font:0.8rem/1.55 "SF Mono",Consolas,monospace; color:#20ff20; background:#0c0c0c; white-space:pre-wrap; word-break:break-word; }
.tbody .to { margin-bottom:2px; }
.tbody .tdim { color:#4a4; }
.tbody .tbold { color:#20ff20; font-weight:bold; }
.tbody .terr { color:#ff4444; }
.tbody .twarn { color:#ffaa00; }

.tinput { display:flex; align-items:center; background:#0c0c0c; border-top:1px solid #2a2a2a; padding:8px 16px; }
.tinput span { color:#20ff20; font-family:"SF Mono",Consolas,monospace; font-size:0.82rem; margin-right:6px; }
.tinput input { flex:1; background:transparent; border:none; outline:none; color:#20ff20; font-family:"SF Mono",Consolas,monospace; font-size:0.82rem; caret-color:#20ff20; }
.tinput input::placeholder { color:#3a3; }

@media (max-width: 800px) {
  .toverlay { padding:0; }
  .twindow { max-width:none; border-radius:0; }
}

/* Admin panel sidebar */
.admin-panel {
  position: fixed;
  top: 0; right: 0;
  width: 420px; max-width: 100vw;
  height: 100vh;
  background: var(--admin-bg);
  border-left: 1px solid var(--border-3);
  z-index: 900;
  transform: translateX(100%);
  transition: transform 0.25s ease;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.admin-panel.open { transform: translateX(0); }

.admin-panel-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border-2);
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--accent);
}

.admin-panel-header button {
  background: none; border: none;
  color: var(--text-dim); font-size: 1.3rem;
  cursor: pointer; line-height: 1; padding: 0 4px;
}
.admin-panel-header button:hover { color: var(--accent); }

.admin-panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.admin-section {
  margin-bottom: 24px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
}

.admin-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

.admin-section h3 {
  font-size: 0.85rem;
  color: var(--text-sec);
  margin-bottom: 12px;
  font-weight: 600;
}

.form-group { margin-bottom: 12px; }

.form-group label {
  display: block;
  font-size: 0.78rem;

}

.filter-bar {

.filter-bar.show { display: flex; }

.filter-bar .filter-clear {

}
.filter-bar .filter-clear:hover { background: var(--accent); color: var(--text-inverse); }

/* Thumbnail mode */
.thumb-mode .tile { cursor: pointer; overflow: hidden; }
.thumb-mode .tile-media-wrap { line-height: 0; }
.thumb-mode .tile-img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; background: var(--img-bg); }
.thumb-mode .tile-body { display: none; }
.thumb-mode .tile-edit-btn { opacity: 0; position: absolute; top: 4px; right: 4px; z-index: 5; background: var(--play-bg); border: 1px solid var(--accent); color: var(--accent); font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; cursor: pointer; transition: opacity 0.2s; }
.thumb-mode .tile:hover .tile-edit-btn { opacity: 1; }
.thumb-mode .tile .tile-title { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.8)); color: #fff; font-size: 0.78rem; font-weight: 600; padding: 24px 8px 6px; display: block; -webkit-line-clamp: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.thumb-mode .tile:hover { border-color: var(--accent); box-shadow: 0 2px 12px var(--accent-light); }

/* Column slider */
.col-slider { display: inline-flex; align-items: center; gap: 4px; }
.col-slider input[type="range"] { width: 60px; height: 4px; appearance: none; background: var(--toggle-bg); border-radius: 2px; outline: none; }
.col-slider input[type="range"]::-webkit-slider-thumb { appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); cursor: pointer; border: none; }

/* Multi-image gallery in form */
.img-gallery { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.img-gallery .img-thumb { position: relative; width: 80px; height: 80px; border-radius: 6px; overflow: hidden; border: 1px solid var(--border-2); background: var(--img-bg); flex-shrink: 0; }

.img-gallery .img-thumb .del-thumb { position: absolute; top: 2px; right: 2px; width: 18px; height: 18px; background: rgba(0,0,0,0.7); border: none; color: var(--danger); font-size: 0.7rem; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; padding: 0; }
.img-gallery .img-add-btn { width: 80px; height: 80px; border: 2px dashed var(--border-3); border-radius: 6px; background: transparent; color: var(--text-dim); font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
.img-gallery .img-add-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Modal image gallery */
.modal-gallery { display: flex; flex-direction: column; gap: 8px; margin: 0 auto 16px; }
.modal-gallery img { width: 100%; max-height: 70vh; object-fit: contain; border-radius: 6px; background: var(--modimg-bg); display: block; }

/* Mobile improvements */
@media (max-width: 600px) {
  .controls { gap: 8px; }
  .controls label { font-size: 0.75rem; }
  .admin-panel { width: 100vw; }
  .admin-panel-body { padding: 14px; }

}

<script>
(function() {
'use strict';

const PER_PAGE = 20;
let posts = [];
let currentPage = 1;
let isInfinite = true;
let isTextOnly = false;
let observer = null;
let editingId = null;
let filterMode = null;
let filterPosts = [];
let filterQuery = '';
let isThumbMode = false;
let thumbCols = 4;

function _idb() {
  return new Promise(function(r, reject) {
    var db = indexedDB.open('kredtidy', 1);
    db.onupgradeneeded = function(e) { e.target.result.createObjectStore('posts', { keyPath: 'id' }); };
    db.onsuccess = function(e) { r(e.target.result); };
    db.onerror = function() { reject(db.error); };
  });
}

window.cms = {
  getPosts: function() {
    return _idb().then(function(db) {
      return new Promise(function(r) {
        var tx = db.transaction('posts', 'readonly');
        var all = tx.objectStore('posts').getAll();
        all.onsuccess = function() { r(all.result || []); db.close(); };
        all.onerror = function() { r([]); db.close(); };
      });
    }).catch(function() { return []; });
  },
  savePosts: function(p) {
    return _idb().then(function(db) {
      return new Promise(function(r) {
        var tx = db.transaction('posts', 'readwrite');
        var store = tx.objectStore('posts');
        store.clear();
        p.forEach(function(post) { store.put(post); });
        tx.oncomplete = function() { r(true); db.close(); };
        tx.onerror = function() { r(false); db.close(); };
      });
    }).catch(function() { return false; });
  },
  importFile: () => new Promise(r => {
    const i = document.createElement('input'); i.type = 'file'; i.accept = '.json';
    i.onchange = () => {
      const f = new FileReader();
      f.onload = e => { try { const d = JSON.parse(e.target.result); r(Array.isArray(d) ? d : (d.posts || [])); } catch { r(null); } };
      f.readAsText(i.files[0]);
    };
    i.click();
  }),
  exportFile: (data) => {
    const b = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const u = URL.createObjectURL(b); const a = document.createElement('a');
    var name = prompt('Export filename:', 'kredtidy-export.json'); if (!name) { URL.revokeObjectURL(u); return false; }
    a.href = u; a.download = name; a.click(); URL.revokeObjectURL(u); return true;
  },
  pickImage: () => new Promise(r => {
    const i = document.createElement('input'); i.type = 'file'; i.accept = 'image/png,image/jpeg,image/gif,image/webp,image/svg+xml'; i.multiple = true;
    i.onchange = () => {
      Promise.all(Array.from(i.files).map(f => new Promise(res => {
        const fr = new FileReader();
        fr.onload = e => {
          const img = new Image();
          img.onload = () => {
            var w = img.width, h = img.height;
            var max = 1600;
            if (w > max || h > max) {
              if (w > h) { h = h * max / w; w = max; } else { w = w * max / h; h = max; }
              var c = document.createElement('canvas'); c.width = w; c.height = h;
              var ctx = c.getContext('2d');
              if (f.type === 'image/jpeg' || f.type === 'image/webp') ctx.drawImage(img, 0, 0, w, h);
              else { ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, w, h); ctx.drawImage(img, 0, 0, w, h); }
              res(c.toDataURL('image/jpeg', 0.7));
            } else { res(e.target.result); }
          };
          img.src = e.target.result;
        };
        fr.readAsDataURL(f);
      }))).then(r);
    };
    i.click();
  })
};

function $(id) { return document.getElementById(id); }
window.$ = $;

function displayPosts() { return filterMode ? filterPosts : posts; }

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function stripHtml(html) {
  const d = document.createElement('div');
  d.innerHTML = html || '';
  return d.textContent || d.innerText || '';
}

function truncate(text, max) {
  return text.length > max ? text.slice(0, max) + '\u2026' : text;
}

function formatDate(dateStr, withTime, longMonth) {
  if (!dateStr) return '';
  try {
    const d = new Date(dateStr);
    const opts = { month: longMonth ? 'long' : 'short', day: 'numeric', year: 'numeric' };
    if (withTime) { opts.hour = 'numeric'; opts.minute = '2-digit'; }
    return d.toLocaleDateString('en-US', opts);
  } catch { return dateStr; }
}

function dateSearchStr(p) {
  const raw = (p.date || '').toLowerCase();
  const s = formatDate(p.date).toLowerCase();
  const f = formatDate(p.date, false, true).toLowerCase();
  const sT = formatDate(p.date, true).toLowerCase();
  const fT = formatDate(p.date, true, true).toLowerCase();
  return raw + ' ' + s + ' ' + f + ' ' + sT + ' ' + fT;
}

function formatTime(dateStr) {
  if (!dateStr) return '';
  try {
    const d = new Date(dateStr);
    return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
  } catch { return ''; }
}

function extractYoutubeId(str) {
  if (!str) return null;
  const m = str.match(/(?:youtube\.com\/(?:embed\/|watch\?v=)|youtu\.be\/|youtube\.com\/live\/)([\w-]{11})/);
  return m ? m[1] : null;
}

function firstImage(post) {
  const imgs = getImages(post);
  if (imgs.length) return imgs[0];
  if (post.type === 'video') {
    const ytId = extractYoutubeId(post.videoSource || '');
    if (ytId) return 'https://img.youtube.com/vi/' + ytId + '/hqdefault.jpg';
  }
  return null;
}

function isVideoPost(post) {
  return post.type === 'video';
}

function extractText(post) {
  if (post.type === 'text') return stripHtml(post.body || '');
  if (post.type === 'photo') return stripHtml(post.body || '');
  if (post.type === 'quote') return stripHtml(post.body || '');
  if (post.type === 'link') return stripHtml(post.body || '');
  if (post.type === 'video') return stripHtml(post.body || '');
  if (post.type === 'audio') return stripHtml(post.body || '');
  return stripHtml(post.body || '');
}

function extractTitle(post) {
  return post.title || extractText(post).slice(0, 80);
}

function getImages(post) {
  if (post.images && post.images.length) return post.images;
  if (post.image) return [post.image];
  return [];
}

function getCols() {
  if (isThumbMode) return thumbCols;
  const w = window.innerWidth;
  if (w <= 500) return 1;
  if (w <= 800) return 2;
  if (w <= 1100) return 3;
  return 4;
}

function tileHtml(post) {
  const title = extractTitle(post);
  const text = extractText(post);
  const tags = post.tags || [];
  const date = formatDate(post.date, true);
  const id = post.id;

  if (isTextOnly) {
    return '<div class="tile" data-post-id="' + id + '" onclick="openPost(\'' + id + '\')">' +
      '<div class="tile-body">' +
        '<span class="tile-date">' + date + ' </span>' +
        '<span class="tile-meta">[' + escHtml(post.type) + ']</span>' +
        (title ? '<span class="tile-title">' + escHtml(title) + '</span>' : '') +
        (text ? '<span class="tile-text">' + escHtml(truncate(text, 280)) + '</span>' : '') +
        (tags.length ? '<span class="tile-tags">' + tags.map(t => '<span class="tile-tag">' + escHtml(t) + '</span>').join('') + '</span>' : '') +
      '</div>' +
    '</div>';
  }

  const img = firstImage(post);
  const isVideo = isVideoPost(post);
  const imgs = getImages(post);
  const multi = imgs.length > 1;

  if (isThumbMode) {
    return '<div class="tile" data-post-id="' + id + '" onclick="openPost(\'' + id + '\')">' +
      '<div class="tile-inner">' +
        (img ? '<div class="tile-media-wrap">' + (isVideo ? '<div class="tile-play"></div>' : '') + '<img class="tile-img" src="' + img + '" alt="" loading="lazy">' + (multi ? '<span style="position:absolute;top:4px;left:4px;background:rgba(0,0,0,0.7);color:#fff;font-size:0.65rem;padding:1px 6px;border-radius:3px">+' + (imgs.length - 1) + '</span>' : '') + '</div>' : '') +
        (title ? '<div class="tile-title">' + escHtml(title) + '</div>' : '') +
      '</div>' +
      '<button class="tile-edit-btn" onclick="event.stopPropagation();editPost(\'' + id + '\')">edit</button>' +
    '</div>';
  }

  return '<div class="tile" data-post-id="' + id + '" onclick="openPost(\'' + id + '\')">' +
    '<div class="tile-inner">' +
      (img ? '<div class="tile-media-wrap">' + (isVideo ? '<div class="tile-play"></div>' : '') + '<img class="tile-img" src="' + img + '" alt="" loading="lazy"></div>' : '') +
      '<div class="tile-body">' +
        (title ? '<div class="tile-title">' + escHtml(title) + '</div>' : '') +
        (text ? '<div class="tile-text">' + escHtml(truncate(text, 180)) + '</div>' : '') +
        '<div class="tile-meta">' +
          '<span class="tile-date">' + date + '</span>' +
          '<span style="color:#555;text-transform:capitalize;font-size:0.7rem">' + escHtml(post.type) + '</span>' +
        '</div>' +
        (tags.length ? '<div class="tile-tags">' + tags.map(t => '<span class="tile-tag">' + escHtml(t) + '</span>').join('') + '</div>' : '') +
      '</div>' +
      '<div class="tile-permalink">&#182; permalink</div>' +
    '</div>' +
    '<button class="tile-edit-btn" onclick="event.stopPropagation();editPost(\'' + id + '\')">edit</button>' +
  '</div>';
}

function applyMasonry() {
  if (isTextOnly) {
    const g = $('grid'); const s = $('sentinel');
    g.style.height = 'auto';
    s.style.top = (g.offsetHeight - 1) + 'px';
    return;
  }
  const grid = $('grid');
  const tiles = Array.from(grid.querySelectorAll('.tile'));
  if (!tiles.length) return;

  const cols = getCols();
  const gap = 16;
  const pad = parseInt(getComputedStyle(grid).paddingLeft) || 24;
  const gw = grid.offsetWidth - pad * 2;
  if (gw <= 0) return;
  const cw = (gw - gap * (cols - 1)) / cols;
  const heights = new Array(cols).fill(0);

  tiles.forEach(tile => {
    const shortest = heights.indexOf(Math.min(...heights));
    tile.style.position = 'absolute';
    tile.style.width = cw + 'px';
    tile.style.left = shortest * (cw + gap) + 'px';
    tile.style.top = heights[shortest] + 'px';
    heights[shortest] += tile.offsetHeight + gap;
  });

  grid.style.height = Math.max(...heights) + 'px';
  const sentinel = $('sentinel');
  sentinel.style.top = (Math.max(...heights) - 1) + 'px';
}

async function loadAllPosts() {
  try {
    posts = (await window.cms.getPosts()) || [];
    posts.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  } catch(e) {
    posts = [];
  }
}

async function renderPage(page, append) {
  const source = displayPosts();
  const start = (page - 1) * PER_PAGE;
  const pagePosts = source.slice(start, start + PER_PAGE);

  if (append) {
    $('grid').insertAdjacentHTML('beforeend', pagePosts.map(tileHtml).join(''));
  } else {
    const emptyMsg = filterMode
      ? '<div class="empty">No posts match <b>' + escHtml(filterQuery) + '</b></div>'
      : '<div class="empty">No posts yet. Click <b>+ Admin</b> to create your first post.</div>';
    $('grid').innerHTML = pagePosts.length ? pagePosts.map(tileHtml).join('') : emptyMsg;
  }

  $('total').textContent = source.length + ' posts total' + (filterMode ? ' (filtered)' : '');

  if (!append) {
    const fb = $('filterBar');
    if (filterMode) {
      fb.classList.add('show');
      $('filterLabel').textContent = filterMode + ': ' + filterQuery + ' (' + source.length + ' results)';
    } else {
      fb.classList.remove('show');
    }
  }

  applyMasonry();
  $('grid').querySelectorAll('img').forEach(img => {
    if (!img.complete) img.addEventListener('load', applyMasonry, { once: true });
  });
  setTimeout(applyMasonry, 200);

  const totalPages = Math.ceil(source.length / PER_PAGE);
  if (page >= totalPages) {
    if (isInfinite && source.length > 0) {
      $('pagination').innerHTML = '<div style="text-align:center;padding:32px;color:var(--text-muted);font-size:0.85rem">All ' + source.length + ' posts loaded.</div>';
    }
    if (!isInfinite) renderPaginationBtns();
  } else {
    if (!isInfinite) renderPaginationBtns();
  }

  if (isInfinite) setupInfiniteScroll();
}

function setupInfiniteScroll() {
  if (observer) observer.disconnect();
  const totalPages = Math.ceil(posts.length / PER_PAGE);
  if (currentPage >= totalPages) return;

  const sentinel = $('sentinel');
  observer = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) {
      const nextPage = Math.ceil($('grid').querySelectorAll('.tile').length / PER_PAGE) + 1;
      if (nextPage <= totalPages) {
        const spinner = document.createElement('div');
        spinner.className = 'loading';
        spinner.id = 'load-spinner';
        $('pagination').innerHTML = '';
        $('pagination').appendChild(spinner);
        currentPage = nextPage;
        renderPage(nextPage, true);
      }
    }
  }, { rootMargin: '400px' });
  observer.observe(sentinel);
}

function renderPaginationBtns() {
  const total = Math.ceil(posts.length / PER_PAGE);
  const el = $('pagination');
  if (total <= 1) { el.innerHTML = ''; return; }

  let h = '';
  h += '<button onclick="goPage(' + (currentPage - 1) + ')" ' + (currentPage <= 1 ? 'disabled' : '') + '>&#8249; Prev</button>';

  let startPage = Math.max(1, currentPage - 3);
  let endPage = Math.min(total, currentPage + 3);

  if (startPage > 1) {
    h += '<button class="page-btn" onclick="goPage(1)">1</button>';
    if (startPage > 2) h += '<span style="color:var(--text-muted)">\u2026</span>';
  }

  for (let i = startPage; i <= endPage; i++) {
    h += '<button class="page-btn' + (i === currentPage ? ' current' : '') + '" onclick="goPage(' + i + ')">' + i + '</button>';
  }

  if (endPage < total) {
    if (endPage < total - 1) h += '<span style="color:var(--text-muted)">\u2026</span>';
    h += '<button class="page-btn" onclick="goPage(' + total + ')">' + total + '</button>';
  }

  h += '<button onclick="goPage(' + (currentPage + 1) + '" ' + (currentPage >= total ? 'disabled' : '') + '>Next &#8250;</button>';
  el.innerHTML = h;
}

window.goPage = function(page) {
  const total = Math.ceil(posts.length / PER_PAGE);
  if (page < 1 || page > total) return;
  currentPage = page;
  renderPage(page, false);
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

window.openPost = function(id) {
  const post = posts.find(p => p.id === id);
  if (!post) return;
  renderModal(post);
  $('modal').classList.add('open');
};

window.editPost = function(id) {
  const post = posts.find(p => p.id === id);
  if (!post) return;
  editingId = id;
  $('editId').value = id;
  $('formTitle').textContent = 'Edit Post';
  $('postTitle').value = post.title || '';
  $('postType').value = post.type || 'text';
  $('postBody').value = post.body || '';
  $('postTags').value = (post.tags || []).join(', ');
  $('postDate').value = (post.date || '').slice(0, 10);
  $('postLink').value = post.linkUrl || '';
  $('postVideo').value = post.videoSource || '';
  $('postAudio').value = post.audioSource || '';

  $('editImagePath').value = JSON.stringify(imgs);

function renderModal(post) {
  const title = extractTitle(post);
  const tags = post.tags || [];
  const date = formatDate(post.date, true);
  const type = post.type;
  const id = post.id;

  let img = null;
  if (post.type === 'photo' || post.type === 'text') {
    img = post.image || null;
  } else if (post.type === 'video') {
    const ytId = extractYoutubeId(post.videoSource || '');
    if (ytId) img = 'https://img.youtube.com/vi/' + ytId + '/hqdefault.jpg';
    else img = post.image || null;
  }

  let bodyHtml = post.body || '';
  if (post.type === 'video') {
    const ytId = extractYoutubeId(post.videoSource || '');
    if (ytId) {
      bodyHtml = '<div style="position:relative;width:100%;aspect-ratio:16/9;background:#000;border-radius:6px;overflow:hidden;margin:8px 0"><iframe src="https://www.youtube.com/embed/' + ytId + '" style="position:absolute;inset:0;width:100%;height:100%;border:0" allowfullscreen></iframe></div>';
      if (post.body) bodyHtml += '<p style="margin-top:12px">' + post.body + '</p>';
    }
  }

  const modalImgs = post.type !== 'video' ? getImages(post) : [];
  const galleryHtml = modalImgs.length > 1
    ? '<div class="modal-gallery">' + modalImgs.map(u => '<img src="' + u + '" alt="" loading="lazy">').join('') + '</div>'
    : (modalImgs.length === 1 ? '<img class="modal-img" src="' + modalImgs[0] + '" alt="" loading="lazy">' : '');

  $('modalInner').innerHTML =
    '<div class="modal-head">' +
      (title ? '<div class="modal-title">' + escHtml(title) + '</div>' : '') +
      '<div class="modal-date">' + date + '</div>' +
      '<div class="modal-meta">' +
        '<span>' + escHtml(type) + '</span>' +
        (modalImgs.length > 1 ? '<span>' + modalImgs.length + ' images</span>' : '') +
      '</div>' +
    '</div>' +
    galleryHtml +
    '<div class="modal-body">' + bodyHtml + '</div>' +
    (tags.length ? '<div class="modal-tags">' + tags.map(t => '<span>#' + escHtml(t) + '</span>').join('') + '</div>' : '') +
    '<div class="modal-footer">' +
      '<button onclick="$(\'modal\').classList.remove(\'open\');editPost(\'' + id + '\')">Edit</button>' +
      '<button class="danger" onclick="deleteAndClose(\'' + id + '\')">Delete</button>' +
    '</div>';
}

window.deleteAndClose = async function(id) {

};

function closeModal() {

}

function cleanPost(p) {
  return Object.assign({}, p);
}

function applyFilter(mode, list, query) {

  filterPosts = list;
  filterQuery = query;
  currentPage = 1;

// Admin panel
function updateTypeFields() {
  const t = $('postType').value;
  $('bodyGroup').style.display = 'block';
  $('imageGroup').style.display = 'block';
  $('linkGroup').style.display = t === 'link' ? 'block' : 'none';
  $('videoGroup').style.display = t === 'video' ? 'block' : 'none';
  $('audioGroup').style.display = t === 'audio' ? 'block' : 'none';
  $('postBody').parentElement.querySelector('label').textContent =
    t === 'quote' ? 'Quote text' :
    t === 'link' ? 'Description' : 'Body (HTML allowed)';
}

function resetForm() {
  editingId = null;
  $('editId').value = '';
  $('formTitle').textContent = 'New Post';
  $('postTitle').value = '';
  $('postType').value = 'text';
  $('postBody').value = '';
  $('postTags').value = '';
  $('postDate').value = new Date().toISOString().slice(0, 10);
  $('postLink').value = '';
  $('postVideo').value = '';
  $('postAudio').value = '';
  $('editImagePath').value = '';
  renderImgGallery();
  $('savePostBtn').textContent = 'Publish Post';
  $('cancelEditBtn').style.display = 'none';
  $('deletePostBtn').style.display = 'none';

}

async function savePost() {
  const title = $('postTitle').value.trim();
  const type = $('postType').value;
  const body = $('postBody').value;
  const tags = $('postTags').value.split(',').map(t => t.trim()).filter(Boolean);
  const date = $('postDate').value || new Date().toISOString().slice(0, 10);
  const linkUrl = $('postLink').value.trim();
  const videoSource = $('postVideo').value.trim();
  const audioSource = $('postAudio').value.trim();
  let images = [];
  try { images = JSON.parse($('editImagePath').value || '[]'); } catch(e) {}
  if (!Array.isArray(images)) images = [];

  const post = {
    id: editingId || Date.now().toString(36) + Math.random().toString(36).slice(2, 8),
    title, type, body, tags, date,
    linkUrl, videoSource, audioSource,
    images: images.filter(Boolean)
  };

  if (editingId) {
    posts = posts.map(p => p.id === editingId ? post : p);
  } else {
    posts.unshift(post);
  }

  posts.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  if (!(await window.cms.savePosts(posts.map(cleanPost)))) { posts = posts.filter(p => p.id !== post.id); return; }
  clearFilter();
  resetForm();
  $('adminPanel').classList.remove('open');
  $('adminBtn').classList.remove('active');
  renderAdminList();
}

async function deletePost() {
  if (!editingId) return;
  if (!confirm('Delete this post permanently?')) return;
  posts = posts.filter(p => p.id !== editingId);
  await window.cms.savePosts(posts.map(cleanPost));
  resetForm();
  $('adminPanel').classList.remove('open');
  $('adminBtn').classList.remove('active');
  clearFilter();
  renderAdminList();
}

function renderImgGallery() {
  let urls = [];
  try { urls = JSON.parse($('editImagePath').value || '[]'); } catch(e) {}
  if (!Array.isArray(urls)) urls = [];
  const gal = $('imgGallery');
  let h = urls.map((u, i) =>
    '<div class="img-thumb"><img src="' + u + '" alt=""><button class="del-thumb" data-idx="' + i + '">&times;</button></div>'
  ).join('');
  h += '<button class="img-add-btn" id="pickImageBtn">+</button>';
  gal.innerHTML = h;
  gal.querySelectorAll('.del-thumb').forEach(btn => {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      const idx = parseInt(this.dataset.idx);
      let arr = [];
      try { arr = JSON.parse($('editImagePath').value || '[]'); } catch(e) {}
      arr.splice(idx, 1);
      $('editImagePath').value = JSON.stringify(arr);
      renderImgGallery();
    });
  });
  $('pickImageBtn').addEventListener('click', pickImage);
}

async function pickImage() {
  try {
    const input = document.createElement('input');
    input.type = 'file'; input.multiple = true;
    input.accept = 'image/png,image/jpeg,image/gif,image/webp,image/svg+xml';
    const dataUrls = await new Promise(r => {
      input.onchange = () => {
        Promise.all(Array.from(input.files).map(f => new Promise(res => {
          const fr = new FileReader();
          fr.onload = e => res(e.target.result);
          fr.readAsDataURL(f);
        }))).then(r);
      };
      input.click();
    });
    if (dataUrls && dataUrls.length) {
      let existing = [];
      try { existing = JSON.parse($('editImagePath').value || '[]'); } catch(e) {}
      existing.push(...dataUrls);
      $('editImagePath').value = JSON.stringify(existing);
      renderImgGallery();
    }
  } catch(e) {}
}

function renderAdminList() {
  const q = ($('postSearch').value || '').toLowerCase();
  const filtered = posts.filter(p => {
    if (!q) return true;
    return (p.title || '').toLowerCase().includes(q) ||
           (p.body || '').toLowerCase().includes(q) ||
           (p.tags || []).some(t => t.toLowerCase().includes(q)) ||
           dateSearchStr(p).includes(q);
  });

  $('adminPostList').innerHTML = filtered.length ?
    filtered.map(p =>
      '<div class="admin-post-item" onclick="editPost(\'' + p.id + '\')">' +
        '<span>' + escHtml(p.title || extractText(p).slice(0, 50) || '(untitled)') + ' <span style="color:var(--text-muted);font-size:0.7rem">' + escHtml(p.type) + ' - ' + formatDate(p.date) + '</span></span>' +
        '<div class="item-actions">' +
          '<button onclick="event.stopPropagation();editPost(\'' + p.id + '\')">edit</button>' +
          '<button class="del" onclick="event.stopPropagation();deletePostById(\'' + p.id + '\')">\u00d7</button>' +
        '</div>' +
      '</div>'
    ).join('') :
    '<div style="color:var(--text-muted);font-size:0.82rem;text-align:center;padding:16px">No posts match</div>';
}

window.deletePostById = async function(id) {
  if (!confirm('Delete this post?')) return;
  posts = posts.filter(p => p.id !== id);
  await window.cms.savePosts(posts.map(cleanPost));
  clearFilter();
  renderAdminList();
};

async function importPosts() {
  try {
    const data = await window.cms.importFile();
    if (data && data.length > 0) {
      if (!confirm('Import ' + data.length + ' posts? Existing posts with matching IDs will be updated.')) return;
      for (const p of data) {
        if (!p.id) p.id = Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
        const existing = posts.findIndex(e => e.id === p.id);
        if (existing >= 0) posts[existing] = p;
        else posts.push(p);
      }
      posts.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
      await window.cms.savePosts(posts.map(cleanPost));
      clearFilter();
      renderAdminList();
    }
  } catch(e) {}
}

async function exportPosts() {
  try {
    if (!window.cms.exportFile(posts.map(cleanPost))) return;
  } catch(e) {}
}

      panel.classList.add('open');
      this.classList.add('active');
      renderAdminList();
    }
  });

  $('adminClose').addEventListener('click', function() {
    $('adminPanel').classList.remove('open');
    $('adminBtn').classList.remove('active');
    resetForm();
  });

  $('postType').addEventListener('change', updateTypeFields);
  $('savePostBtn').addEventListener('click', savePost);
  $('cancelEditBtn').addEventListener('click', function() {
    resetForm();
  });
  $('deletePostBtn').addEventListener('click', deletePost);
  $('pickImageBtn').addEventListener('click', pickImage);
  $('postSearch').addEventListener('input', renderAdminList);

  $('importBtn').addEventListener('click', importPosts);
  $('exportBtn').addEventListener('click', exportPosts);

  $('filterClear').addEventListener('click', clearFilter);

  // Render
  currentPage = 1;
  renderPage(1, false);
}

init();
})();
</script>
</body>
</html>
