<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Pipe — AAP Liwanag 19.91</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root, [data-theme="dark-green"] {
  --bg: #0a0a0a;
  --card-bg: #141414;
  --card-bg-alt: #1a1a1a;
  --border: #222;
  --border-2: #2a2a2a;
  --border-3: #333;
  --accent: #20ff20;
  --accent-light: rgba(32,255,32,0.12);
  --text: #e0e0e0;
  --text-body: #ccc;
  --text-sec: #aaa;
  --text-tert: #888;
  --text-dim: #666;
  --text-muted: #555;
  --text-quote: #999;
  --modal-bg: #111;
  --img-bg: #1a1a1a;
  --modimg-bg: #0a0a0a;
  --btn-bg: #141414;
  --btn-color: #aaa;
  --toggle-bg: #333;
  --toggle-border: #444;
  --toggle-dot: #888;
  --meta-bg: #1a1a1a;
  --meta-border: #2a2a2a;
  --meta-color: #888;
  --text-inverse: #000;
  --play-bg: rgba(0,0,0,0.7);
  --play-border: #fff;
}

[data-theme="light"] {
  --bg: #f5f5f5;
  --card-bg: #fff;
  --card-bg-alt: #f0f0f0;
  --border: #ddd;
  --border-2: #e0e0e0;
  --border-3: #ccc;
  --accent: #111;
  --accent-light: rgba(0,0,0,0.06);
  --text: #222;
  --text-body: #333;
  --text-sec: #666;
  --text-tert: #888;
  --text-dim: #999;
  --text-muted: #aaa;
  --text-quote: #777;
  --modal-bg: #fff;
  --img-bg: #eee;
  --modimg-bg: #f0f0f0;
  --btn-bg: #f0f0f0;
  --btn-color: #555;
  --toggle-bg: #ddd;
  --toggle-border: #ccc;
  --toggle-dot: #999;
  --meta-bg: #f0f0f0;
  --meta-border: #ddd;
  --meta-color: #666;
  --text-inverse: #fff;
  --play-bg: rgba(0,0,0,0.5);
  --play-border: #fff;
}

[data-theme="dark-blue"] {
  --bg: #060d17;
  --card-bg: #0d1a2d;
  --card-bg-alt: #122540;
  --border: #1a3350;
  --border-2: #204060;
  --border-3: #255080;
  --accent: #40a0ff;
  --accent-light: rgba(64,160,255,0.12);
  --text: #d8e6f4;
  --text-body: #b8d0e8;
  --text-sec: #88a8c8;
  --text-tert: #6a8aab;
  --text-dim: #557390;
  --text-muted: #446080;
  --text-quote: #7a9ab8;
  --modal-bg: #0d1a2d;
  --img-bg: #122540;
  --modimg-bg: #060d17;
  --btn-bg: #0d1a2d;
  --btn-color: #88a8c8;
  --toggle-bg: #1a3350;
  --toggle-border: #204060;
  --toggle-dot: #6a8aab;
  --meta-bg: #122540;
  --meta-border: #204060;
  --meta-color: #6a8aab;
  --text-inverse: #000;
  --play-bg: rgba(0,0,0,0.7);
  --play-border: #fff;
}

[data-theme="light-blue"] {
  --bg: #f0f5fa;
  --card-bg: #fff;
  --card-bg-alt: #e8f0f8;
  --border: #d0dae8;
  --border-2: #c5d3e5;
  --border-3: #b0c0d8;
  --accent: #2a70cc;
  --accent-light: rgba(42,112,204,0.1);
  --text: #1a2a3a;
  --text-body: #2a3a4a;
  --text-sec: #556880;
  --text-tert: #778899;
  --text-dim: #8899aa;
  --text-muted: #99aabb;
  --text-quote: #667788;
  --modal-bg: #fff;
  --img-bg: #e8f0f8;
  --modimg-bg: #f0f5fa;
  --btn-bg: #e8f0f8;
  --btn-color: #556880;
  --toggle-bg: #d0dae8;
  --toggle-border: #c5d3e5;
  --toggle-dot: #8899aa;
  --meta-bg: #e8f0f8;
  --meta-border: #d0dae8;
  --meta-color: #556880;
  --text-inverse: #fff;
  --play-bg: rgba(0,0,0,0.5);
  --play-border: #fff;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, sans-serif;
  min-height: 100vh;
}

.header {
  max-width: 1400px;
  margin: 0 auto;
  padding: 32px 24px 16px;
}

.header h1 {
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--accent);
}

.header h1 a {
  color: var(--accent);
  text-decoration: none;
}

.header .desc { color: var(--text-tert); margin-top: 4px; font-size: 0.95rem; }
.header .total { color: var(--text-muted); font-size: 0.85rem; margin-top: 2px; }

.controls {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-top: 10px;
  flex-wrap: wrap;
}

.controls label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.82rem;
  color: var(--text-tert);
  cursor: pointer;
}

.theme-select {
  padding: 4px 8px;
  border: 1px solid var(--border-3);
  border-radius: 5px;
  background: var(--card-bg);
  color: var(--text-sec);
  font-size: 0.78rem;
  font-family: inherit;
  cursor: pointer;
  outline: none;
}

.theme-select:focus { border-color: var(--accent); }

.controls input[type="checkbox"] {
  appearance: none;
  width: 36px; height: 20px;
  border-radius: 10px;
  background: var(--toggle-bg);
  border: 1px solid var(--toggle-border);
  cursor: pointer;
  position: relative;
  transition: background 0.2s;
  flex-shrink: 0;
}

.controls input[type="checkbox"]::after {
  content: '';
  position: absolute;
  top: 2px; left: 2px;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--toggle-dot);
  transition: transform 0.2s, background 0.2s;
}

.controls input[type="checkbox"]:checked {
  background: var(--accent);
  border-color: var(--accent);
}

.controls input[type="checkbox"]:checked::after {
  transform: translateX(16px);
  background: var(--text-inverse);
}

.controls .mode-label { font-size: 0.8rem; color: var(--text-dim); }
.controls .mode-label .active { color: var(--accent); font-weight: 600; }

.grid {
  position: relative;
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 24px 24px;
}

#sentinel {
  position: absolute;
  width: 100%; height: 1px;
  left: 0;
  pointer-events: none;
}

.tile {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s;
  cursor: pointer;
  box-sizing: border-box;
}

.tile:hover {
  border-color: var(--accent);
  box-shadow: 0 2px 12px var(--accent-light);
}

.tile-img {
  width: 100%;
  display: block;
  background: var(--img-bg);
}

.tile-media-wrap { position: relative; line-height: 0; }

.tile-play {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 48px; height: 48px;
  background: var(--play-bg);
  border: 2px solid var(--play-border);
  border-radius: 50%;
  pointer-events: none;
  z-index: 2;
}

.tile-play::after {
  content: '';
  position: absolute;
  top: 50%; left: 55%;
  transform: translate(-50%, -50%);
  border-left: 14px solid var(--play-border);
  border-top: 9px solid transparent;
  border-bottom: 9px solid transparent;
}

.tile-body { padding: 12px 14px 14px; }

.tile-title {
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--accent);
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.tile-text {
  font-size: 0.82rem;
  color: var(--text-sec);
  margin-top: 6px;
  line-height: 1.45;
  display: -webkit-box;
  -webkit-line-clamp: 4;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.tile-text p { margin-bottom: 4px; }

.tile-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 10px;
  font-size: 0.72rem;
  color: var(--text-muted);
}

.tile-date { color: var(--text-muted); }

.tile-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }

.tile-tag {
  font-size: 0.68rem;
  padding: 2px 6px;
  border-radius: 4px;
  background: var(--card-bg-alt);
  color: var(--text-dim);
  border: 1px solid var(--border-2);
}

.tile-permalink {
  position: absolute;
  bottom: 8px; right: 8px;
  background: var(--play-bg);
  border: 1px solid var(--accent);
  color: var(--accent);
  font-size: 0.65rem;
  padding: 3px 7px;
  border-radius: 4px;
  opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
}

.tile:hover .tile-permalink { opacity: 1; }

.tile .tile-inner {
  color: inherit;
  text-decoration: none;
  display: block;
  position: relative;
}

.text-only .grid { margin: 0; max-width: none; padding: 0 24px 24px; }
.text-only .grid .tile {
  position: static; width: 100%; background: transparent; border: none;
  border-bottom: 1px solid var(--border); border-radius: 0;
  padding: 14px 4px 12px; overflow: visible;
  font-family: "SF Mono", Consolas, monospace; font-size: 0.82rem; line-height: 1.5; cursor: pointer;
}
.text-only .grid .tile:hover { border-color: var(--accent); box-shadow: none; background: var(--card-bg); }
.text-only .tile-media-wrap, .text-only .tile-img { display: none; }
.text-only .tile-body { padding: 0; }
.text-only .tile-title { display: inline; font-size: 0.85rem; color: var(--accent); font-weight: 600; -webkit-line-clamp: unset; }
.text-only .tile-meta { display: inline; margin-top: 0; font-size: 0.72rem; }
.text-only .tile-meta::before { content: " "; }
.text-only .tile-date { color: var(--text-dim); }
.text-only .tile-text { display: block; margin-top: 4px; font-size: 0.78rem; color: var(--text-sec); -webkit-line-clamp: 3; }
.text-only .tile-tags { margin-top: 4px; }

.pagination {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  max-width: 1400px;
  margin: 24px auto 48px;
  padding: 0 24px;
  flex-wrap: wrap;
}

.pagination button,
.pagination .page-btn {
  padding: 8px 16px;
  border: 1px solid var(--border-3);
  border-radius: 6px;
  background: var(--btn-bg);
  color: var(--btn-color);
  cursor: pointer;
  font-size: 0.85rem;
  transition: all 0.15s;
}

.pagination button:hover:not(:disabled),
.pagination .page-btn:hover:not(.current) {
  border-color: var(--accent);
  color: var(--accent);
}

.pagination button:disabled { opacity: 0.3; cursor: default; }

.pagination .page-btn.current {
  background: var(--accent);
  color: var(--text-inverse);
  border-color: var(--accent);
  font-weight: 600;
}

.loading { text-align: center; padding: 80px 24px; color: var(--text-muted); }

.loading::after {
  content: '';
  display: inline-block;
  width: 24px; height: 24px;
  border: 2px solid var(--border-3);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin-left: 8px;
  vertical-align: middle;
}

@keyframes spin { to { transform: rotate(360deg); } }

.error { text-align: center; padding: 40px; color: #ff6b6b; }

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.2s, visibility 0.2s;
}

.modal-overlay.open { opacity: 1; visibility: visible; }

.modal-content {
  background: var(--modal-bg);
  border: 1px solid var(--border-3);
  border-radius: 12px;
  max-width: 720px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  position: relative;
  padding: 32px;
}

.modal-close {
  position: absolute;
  top: 12px; right: 16px;
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 1.5rem;
  cursor: pointer;
  transition: color 0.15s;
  line-height: 1;
}

.modal-close:hover { color: var(--accent); }

.modal-head { margin-bottom: 20px; padding-right: 32px; }

.modal-head .modal-title {
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--accent);
  line-height: 1.3;
}

.modal-head .modal-date { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }

.modal-head .modal-meta {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 6px;
  font-size: 0.78rem;
}

.modal-head .modal-meta span {
  background: var(--meta-bg);
  border: 1px solid var(--meta-border);
  padding: 2px 8px;
  border-radius: 4px;
  color: var(--meta-color);
}

.modal-img {
  width: 100%;
  max-height: 70vh;
  object-fit: contain;
  display: block;
  margin: 0 auto 20px;
  border-radius: 6px;
  background: var(--modimg-bg);
}

.modal-body {
  font-size: 0.95rem;
  line-height: 1.6;
  color: var(--text-body);
}

.modal-body p { margin-bottom: 12px; }
.modal-body ul, .modal-body ol { margin: 8px 0 12px 24px; }
.modal-body li { margin-bottom: 4px; }
.modal-body a { color: var(--accent); }
.modal-body img { max-width: 100%; border-radius: 6px; margin: 8px 0; }
.modal-body blockquote {
  border-left: 2px solid var(--border-3);
  margin: 12px 0;
  padding-left: 16px;
  color: var(--text-quote);
}
.modal-body h1, .modal-body h2, .modal-body h3 { color: var(--text); margin: 16px 0 8px; }
.modal-body hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
.modal-body iframe {
  max-width: 100%;
  aspect-ratio: 16/9;
  height: auto;
  border: none;
  border-radius: 6px;
  margin: 8px 0;
  display: block;
}

.modal-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}

.modal-tags a {
  font-size: 0.78rem;
  padding: 4px 10px;
  border-radius: 4px;
  background: var(--meta-bg);
  border: 1px solid var(--meta-border);
  color: var(--meta-color);
  text-decoration: none;
  transition: all 0.15s;
}

.modal-tags a:hover { border-color: var(--accent); color: var(--accent); }

.modal-footer {
  margin-top: 20px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
}

.modal-footer a {
  font-size: 0.82rem;
  color: var(--accent);
  text-decoration: none;
  border: 1px solid var(--accent);
  padding: 6px 14px;
  border-radius: 6px;
  transition: all 0.15s;
}

.modal-footer a:hover { background: var(--accent); color: var(--text-inverse); }

@media (max-width: 800px) {
  .modal-content { padding: 24px 20px; }
  .modal-head .modal-title { font-size: 1.1rem; }
  .header { padding: 24px 16px 12px; }
  .header h1 { font-size: 1.4rem; }
}

.term-btn {
  padding: 4px 12px; border: 1px solid var(--border-3);
  border-radius: 5px; background: var(--card-bg);
  color: var(--text-sec); cursor: pointer;
  font-size: 0.78rem; font-family: "SF Mono", Consolas, monospace;
  transition: all 0.15s;
}
.term-btn:hover { border-color: var(--accent); color: var(--accent); }

.toverlay { position:fixed; inset:0; z-index:2000; background:rgba(0,0,0,0.92); display:none; align-items:center; justify-content:center; padding:8px; }
.toverlay.open { display:flex; }

.twindow { width:100%; max-width:960px; height:85vh; height:85dvh; background:#0c0c0c; border:1px solid #333; border-radius:8px; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 0 60px rgba(32,255,32,0.08); }

.ttbar { background:#1a1a1a; padding:8px 14px; display:flex; align-items:center; font-family:"SF Mono",Consolas,monospace; font-size:0.75rem; color:#777; border-bottom:1px solid #2a2a2a; user-select:none; }
.ttbar span { flex:1; }
.ttbar .tclose { background:none; border:none; color:#666; cursor:pointer; font-size:1.2rem; line-height:1; padding:0 4px; }
.ttbar .tclose:hover { color:#ff5f57; }

.tbody { flex:1; overflow-y:auto; padding:10px 16px; font:0.8rem/1.55 "SF Mono",Consolas,monospace; color:#20ff20; background:#0c0c0c; white-space:pre-wrap; word-break:break-word; }
.tbody .to { margin-bottom:2px; }
.tbody .tdim { color:#4a4; }
.tbody .tbold { color:#20ff20; font-weight:bold; }
.tbody .terr { color:#ff4444; }
.tbody .twarn { color:#ffaa00; }

.tinput { display:flex; align-items:center; background:#0c0c0c; border-top:1px solid #2a2a2a; padding:8px 16px; }
.tinput span { color:#20ff20; font-family:"SF Mono",Consolas,monospace; font-size:0.82rem; margin-right:6px; }
.tinput input { flex:1; background:transparent; border:none; outline:none; color:#20ff20; font-family:"SF Mono",Consolas,monospace; font-size:0.82rem; caret-color:#20ff20; }
.tinput input::placeholder { color:#3a3; }

@media (max-width: 800px) {
  .toverlay { padding:0; }
  .twindow { max-width:none; border-radius:0; }
}
</style>
</head>
<body>

<div class="header">
  <h1><a href="https://kredtidy.tumblr.com" target="_blank">Web Pipe — AAP Liwanag 19.91</a></h1>
  <div class="desc">Artist / MetaDeveloper / B.I.G.</div>
  <div class="total" id="total"></div>
  <div class="controls">
    <label>
      <input type="checkbox" id="modeToggle" checked>
      <span class="mode-label">Infinite scroll <span class="active" id="modeDisplay">on</span></span>
    </label>
    <label>
      <input type="checkbox" id="textOnlyToggle">
      <span class="mode-label">Text only <span class="active" id="textOnlyDisplay">off</span></span>
    </label>
    <select class="theme-select" id="themeSelect">
      <option value="dark-green">Dark Green</option>
      <option value="light">Light</option>
      <option value="dark-blue">Dark Blue</option>
      <option value="light-blue">Light Blue</option>
    </select>
    <button class="term-btn" id="terminalBtn">&gt;_ Terminal</button>
  </div>
</div>

<div class="grid" id="grid"></div>

<div class="pagination" id="pagination"></div>
<div id="sentinel"></div>

<div class="modal-overlay" id="modal">
  <div class="modal-content" id="modalContent">
    <button class="modal-close" id="modalClose">&times;</button>
    <div id="modalInner"></div>
  </div>
</div>

<div class="toverlay" id="toverlay">
  <div class="twindow">
    <div class="ttbar">
      <span>kredtidy@web-pipe</span>
      <button class="tclose" id="tclose">&times;</button>
    </div>
    <div class="tbody" id="tbody"></div>
    <div class="tinput">
      <span>$</span>
      <input id="tinput" placeholder="type help…" autocomplete="off" autocapitalize="off" spellcheck="false">
    </div>
  </div>
</div>

<script>
const BLOG = 'kredtidy';
const PER_PAGE = 20;
let currentPage = 1;
let totalPosts = 0;
let isInfinite = true;
let isTextOnly = false;
let loading = false;
let allLoaded = false;
let observer = null;
const postCache = new Map();

function $(id) { return document.getElementById(id); }

function stripHtml(html) {
  const d = document.createElement('div');
  d.innerHTML = html;
  return d.textContent || d.innerText || '';
}

function truncate(text, max) {
  return text.length > max ? text.slice(0, max) + '…' : text;
}

function formatDate(dateStr) {
  try {
    const d = new Date(dateStr);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  } catch { return dateStr; }
}

function formatTime(dateStr) {
  try {
    const d = new Date(dateStr);
    return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
  } catch { return ''; }
}

function extractYoutubeId(str) {
  if (!str) return null;
  var m = str.match(/(?:youtube\.com\/(?:embed\/|watch\?v=)|youtu\.be\/|youtube\.com\/live\/)([\w-]{11})/);
  return m ? m[1] : null;
}

function firstImage(post) {
  if (post.type === 'photo') {
    return post['photo-url-500'] || post['photo-url-250'] || null;
  }
  if (post.type === 'regular') {
    const img = (post['regular-body'] || '').match(/<img[^>]+src=["']([^"']+)/);
    if (img) return img[1];
    const ytId = extractYoutubeId(post['regular-body'] || '');
    if (ytId) return 'https://img.youtube.com/vi/' + ytId + '/hqdefault.jpg';
    return null;
  }
  if (post.type === 'video') {
    const ytId = extractYoutubeId(post['video-source'] || post['video-player'] || '');
    if (ytId) return 'https://img.youtube.com/vi/' + ytId + '/hqdefault.jpg';
    return null;
  }
  return null;
}

function isVideoPost(post) {
  return post.type === 'video' || (post.type === 'regular' && (post['regular-body'] || '').indexOf('tmblr-embed') > -1);
}

function extractText(post) {
  if (post.type === 'regular') return stripHtml(post['regular-body'] || '');
  if (post.type === 'photo') return stripHtml(post['photo-caption'] || '');
  if (post.type === 'quote') return stripHtml(post['quote-text'] || '');
  if (post.type === 'link') return stripHtml(post['link-description'] || post['link-text'] || '');
  if (post.type === 'chat') return stripHtml(post['regular-body'] || post.body || '');
  if (post.type === 'video') return post['video-caption'] ? stripHtml(post['video-caption']) : '';
  if (post.type === 'audio') return post['audio-caption'] ? stripHtml(post['audio-caption']) : '';
  if (post.type === 'answer') return stripHtml(post.answer || '');
  return '';
}

function extractTitle(post) {
  if (post.type === 'regular') return post['regular-title'] || '';
  if (post.type === 'photo') return stripHtml(post['photo-caption'] || '').slice(0, 80);
  if (post.type === 'quote') return stripHtml(post['quote-text'] || '').slice(0, 80);
  if (post.type === 'link') return post['link-text'] || post['link-title'] || '';
  if (post.type === 'chat') return post.title || post['regular-title'] || '';
  if (post.type === 'video') return post['video-title'] || (post['video-caption'] ? stripHtml(post['video-caption']).slice(0, 60) : '');
  if (post.type === 'audio') return post['audio-title'] || (post['audio-caption'] ? stripHtml(post['audio-caption']).slice(0, 60) : '');
  if (post.type === 'answer') return stripHtml(post.question || '').slice(0, 80);
  return '';
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function tileHtml(post) {
  const title = extractTitle(post);
  const text = extractText(post);
  const tags = post.tags || [];
  const date = formatDate(post['date-gmt'] || post.date);
  const time = isTextOnly ? formatTime(post['date-gmt'] || post.date) : '';
  const id = post.id;

  if (isTextOnly) {
    return `<div class="tile" data-post-id="${id}" onclick="openPermalink('${id}')">
      <div class="tile-body">
        <span class="tile-date">${date} ${time} </span>
        <span class="tile-meta">[${post.type}]</span>
        ${title ? `<span class="tile-title">${escHtml(title)}</span>` : ''}
        ${text ? `<span class="tile-text">${escHtml(truncate(text, 280))}</span>` : ''}
        ${tags.length ? `<span class="tile-tags">${tags.map(t => `<span class="tile-tag">${escHtml(t)}</span>`).join('')}</span>` : ''}
      </div>
    </div>`;
  }

  const img = firstImage(post);
  const isVideo = isVideoPost(post);

  return `<div class="tile" data-post-id="${id}" onclick="openPermalink('${id}')">
    <div class="tile-inner">
      ${img ? `<div class="tile-media-wrap">${isVideo ? '<div class="tile-play"></div>' : ''}<img class="tile-img" src="${img}" alt="" loading="lazy"></div>` : ''}
      <div class="tile-body">
        ${title ? `<div class="tile-title">${escHtml(title)}</div>` : ''}
        ${text ? `<div class="tile-text">${escHtml(truncate(text, 180))}</div>` : ''}
        <div class="tile-meta">
          <span class="tile-date">${date}</span>
          <span style="color:#555;text-transform:capitalize;font-size:0.7rem">${post.type}</span>
        </div>
        ${tags.length ? `<div class="tile-tags">${tags.map(t => `<span class="tile-tag">${escHtml(t)}</span>`).join('')}</div>` : ''}
      </div>
      <div class="tile-permalink">&#182; permalink</div>
    </div>
  </div>`;
}

function jsonp(url) {
  return new Promise((resolve, reject) => {
    const cb = '_jp' + Math.random().toString(36).slice(2);
    window[cb] = data => { delete window[cb]; resolve(data); };
    const s = document.createElement('script');
    s.src = url + '&callback=' + cb;
    s.onerror = () => { delete window[cb]; reject(new Error('JSONP failed')); };
    document.head.appendChild(s);
  });
}

function getCols() {
  const w = window.innerWidth;
  if (w <= 500) return 1;
  if (w <= 800) return 2;
  if (w <= 1100) return 3;
  return 4;
}

function applyMasonry() {
  if (isTextOnly) {
    var g = $('grid'); var s = $('sentinel');
    g.style.height = 'auto';
    s.style.top = (g.offsetHeight - 1) + 'px';
    return;
  }
  const grid = $('grid');
  const tiles = Array.from(grid.querySelectorAll('.tile'));
  if (!tiles.length) return;

  const cols = getCols();
  const gap = 16;
  const pad = parseInt(getComputedStyle(grid).paddingLeft) || 24;
  const gw = grid.offsetWidth - pad * 2;
  if (gw <= 0) return;
  const cw = (gw - gap * (cols - 1)) / cols;
  const heights = new Array(cols).fill(0);

  tiles.forEach(tile => {
    const shortest = heights.indexOf(Math.min(...heights));
    tile.style.position = 'absolute';
    tile.style.width = cw + 'px';
    tile.style.left = shortest * (cw + gap) + 'px';
    tile.style.top = heights[shortest] + 'px';
    heights[shortest] += tile.offsetHeight + gap;
  });

  grid.style.height = Math.max(...heights) + 'px';
  const sentinel = $('sentinel');
  sentinel.style.top = (Math.max(...heights) - 1) + 'px';
}

async function fetchPage(page, append) {
  if (loading) return;
  const start = (page - 1) * PER_PAGE;
  loading = true;

  if (!append) {
    $('grid').innerHTML = '<div class="loading">Loading…</div>';
  }

  try {
    const data = await jsonp(`https://${BLOG}.tumblr.com/api/read/json?num=${PER_PAGE}&start=${start}`);
    totalPosts = data['posts-total'];
    $('total').textContent = totalPosts + ' posts total';
    loading = false;

    if (!data.posts || data.posts.length === 0) {
      if (!append) $('grid').innerHTML = '<div class="error">No posts found.</div>';
      return;
    }

    data.posts.sort((a, b) => (b['unix-timestamp'] || 0) - (a['unix-timestamp'] || 0));
    data.posts.forEach(p => postCache.set(p.id, p));

    if (append) {
      if (!_results) $('grid').insertAdjacentHTML('beforeend', data.posts.map(tileHtml).join(''));
    } else {
      if (!_results) $('grid').innerHTML = data.posts.map(tileHtml).join('');
    }

    applyMasonry();
    $('grid').querySelectorAll('img').forEach(img => {
      if (!img.complete) img.addEventListener('load', applyMasonry, { once: true });
    });
    setTimeout(applyMasonry, 300);

    const totalPages = Math.ceil(totalPosts / PER_PAGE);
    if (page >= totalPages) {
      allLoaded = true;
      if (isInfinite) {
        $('pagination').innerHTML = '<div style="text-align:center;padding:32px;color:#555;font-size:0.85rem">All ' + totalPosts + ' posts loaded.</div>';
      }
    }

    if (isInfinite) {
      setupInfiniteScroll();
    } else {
      renderPagination();
    }
  } catch {
    loading = false;
    if (!append) $('grid').innerHTML = '<div class="error">Failed to load posts. Try again.</div>';
  }
}

async function fetchSinglePost(id) {
  try {
    const data = await jsonp(`https://${BLOG}.tumblr.com/api/read/json?id=${id}`);
    if (data.posts && data.posts.length) {
      const p = data.posts[0];
      postCache.set(p.id, p);
      return p;
    }
  } catch {}
  return null;
}

async function openPermalink(id) {
  let post = postCache.get(id);
  if (!post) {
    $('modalInner').innerHTML = '<div class="loading">Loading post…</div>';
    $('modal').classList.add('open');
    post = await fetchSinglePost(id);
    if (!post) {
      $('modalInner').innerHTML = '<div class="error">Post not found.</div>';
      return;
    }
  }
  renderModal(post);
  $('modal').classList.add('open');
  history.replaceState(null, '', '#post-' + id);
}

function closePermalink() {
  $('modal').classList.remove('open');
  const hash = location.hash;
  if (hash.startsWith('#post-')) {
    history.replaceState(null, '', isInfinite ? '#infinite' : '');
  }
}

function ytEmbed(ytId) {
  return '<div style="position:relative;width:100%;aspect-ratio:16/9;background:#000;border-radius:6px;overflow:hidden;margin:8px 0"><iframe src="https://www.youtube.com/embed/' + ytId + '" style="position:absolute;inset:0;width:100%;height:100%;border:0" allowfullscreen></iframe></div>';
}

function cleanBodyHtml(html) {
  if (!html) return '';
  return html.replace(/<iframe\b[^>]*>[\s\S]*?<\/iframe>/gi, function(m) {
    var ytId = extractYoutubeId(m);
    if (ytId) return ytEmbed(ytId);
    return '';
  });
}

function renderModal(post) {
  const title = extractTitle(post);
  const tags = post.tags || [];
  const date = formatDate(post['date-gmt'] || post.date);
  const type = post.type;
  const url = post['url-with-slug'] || post.url;
  const notes = post['note-count'] || 0;
  const id = post.id;

  let img = null;
  if (post.type === 'photo') {
    img = post['photo-url-1280'] || post['photo-url-500'] || null;
  } else if (post.type === 'regular') {
    const m = (post['regular-body'] || '').match(/<img[^>]+src=["']([^"']+)/);
    img = m ? m[1] : null;
  } else if (post.type === 'video') {
    const ytId = extractYoutubeId(post['video-source'] || post['video-player'] || '');
    if (ytId) img = 'https://img.youtube.com/vi/' + ytId + '/hqdefault.jpg';
  }

  let bodyHtml = '';
  if (post.type === 'regular') {
    bodyHtml = cleanBodyHtml(post['regular-body'] || '');
  } else if (post.type === 'photo') {
    bodyHtml = post['photo-caption'] || '';
  } else if (post.type === 'quote') {
    bodyHtml = '<blockquote style="color:#ccc;font-size:1.2rem">' + (post['quote-text'] || '') + '</blockquote>';
    if (post['quote-source']) bodyHtml += '<p>&mdash; ' + post['quote-source'] + '</p>';
  } else if (post.type === 'link') {
    bodyHtml = (post['link-description'] || '') + '<p><a href="' + escHtml(post['link-url'] || '#') + '" target="_blank">' + escHtml(post['link-text'] || post['link-url'] || '') + '</a></p>';
  } else if (post.type === 'chat') {
    bodyHtml = post['regular-body'] || post.body || '';
  } else if (post.type === 'video') {
    const ytId2 = extractYoutubeId(post['video-source'] || post['video-player'] || '');
    bodyHtml = ytId2 ? ytEmbed(ytId2) : cleanBodyHtml(post['video-player-500'] || post['video-player'] || '');
    if (post['video-caption']) bodyHtml += '<p style="margin-top:12px">' + post['video-caption'] + '</p>';
  } else if (post.type === 'audio') {
    bodyHtml = cleanBodyHtml(post['audio-player'] || '');
    if (post['audio-caption']) bodyHtml += '<p style="margin-top:12px">' + post['audio-caption'] + '</p>';
  } else if (post.type === 'answer') {
    bodyHtml = '<p><b>Q:</b> ' + (post.question || '') + '</p><p><b>A:</b> ' + (post.answer || '') + '</p>';
  }

  $('modalInner').innerHTML = `
    <div class="modal-head">
      ${title ? `<div class="modal-title">${escHtml(title)}</div>` : ''}
      <div class="modal-date">${date}</div>
      <div class="modal-meta">
        <span>${type}</span>
        <span>${notes} notes</span>
      </div>
    </div>
    ${img && post.type !== 'video' ? `<img class="modal-img" src="${img}" alt="" loading="lazy">` : ''}
    <div class="modal-body">${bodyHtml}</div>
    ${tags.length ? `<div class="modal-tags">${tags.map(t => `<a href="https://${BLOG}.tumblr.com/tagged/${encodeURIComponent(t)}" target="_blank">#${escHtml(t)}</a>`).join('')}</div>` : ''}
    <div class="modal-footer">
      <a href="${url}" target="_blank">View on Tumblr &rarr;</a>
      <a href="#" onclick="event.preventDefault();copyPermalink('${id}')">Copy permalink</a>
    </div>`;
}

function copyPermalink(id) {
  const url = location.origin + location.pathname + '#post-' + id;
  navigator.clipboard.writeText(url).catch(() => {});
}

function setupInfiniteScroll() {
  if (observer) observer.disconnect();
  if (allLoaded) return;

  const sentinel = $('sentinel');
  observer = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting && !loading && !allLoaded) {
      const nextPage = Math.ceil($('grid').querySelectorAll('.tile').length / PER_PAGE) + 1;
      if (nextPage <= Math.ceil(totalPosts / PER_PAGE)) {
        const spinner = document.createElement('div');
        spinner.className = 'loading';
        spinner.id = 'load-spinner';
        $('pagination').innerHTML = '';
        $('pagination').appendChild(spinner);
        fetchPage(nextPage, true);
      }
    }
  }, { rootMargin: '400px' });
  observer.observe(sentinel);
}

function renderPagination() {
  if (observer) observer.disconnect();
  const total = Math.ceil(totalPosts / PER_PAGE);
  const el = $('pagination');
  if (total <= 1) { el.innerHTML = ''; return; }

  let h = '';
  h += `<button onclick="goPage(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>‹ Prev</button>`;

  let startPage = Math.max(1, currentPage - 3);
  let endPage = Math.min(total, currentPage + 3);

  if (startPage > 1) {
    h += `<button class="page-btn" onclick="goPage(1)">1</button>`;
    if (startPage > 2) h += `<span style="color:#555">…</span>`;
  }

  for (let i = startPage; i <= endPage; i++) {
    h += `<button class="page-btn${i === currentPage ? ' current' : ''}" onclick="goPage(${i})">${i}</button>`;
  }

  if (endPage < total) {
    if (endPage < total - 1) h += `<span style="color:#555">…</span>`;
    h += `<button class="page-btn" onclick="goPage(${total})">${total}</button>`;
  }

  h += `<button onclick="goPage(${currentPage + 1})" ${currentPage >= total ? 'disabled' : ''}>Next ›</button>`;
  el.innerHTML = h;
}

function goPage(page) {
  const total = Math.ceil(totalPosts / PER_PAGE);
  if (page < 1 || page > total) return;
  currentPage = page;
  fetchPage(page, false);
  window.scrollTo({ top: 0, behavior: 'smooth' });
  history.replaceState(null, '', '#page=' + page);
}

function toggleTextOnly() {
  isTextOnly = $('textOnlyToggle').checked;
  $('textOnlyDisplay').textContent = isTextOnly ? 'on' : 'off';
  localStorage.setItem('wp-textonly', isTextOnly ? '1' : '0');
  if (isTextOnly) document.body.classList.add('text-only');
  else document.body.classList.remove('text-only');
  if (_results) {
    $('grid').innerHTML = _results.map(tileHtml).join('');
    if (!isTextOnly) applyMasonry();
  } else {
    allLoaded = false; currentPage = 1;
    fetchPage(1, false);
  }
}

function toggleMode() {
  isInfinite = $('modeToggle').checked;
  $('modeDisplay').textContent = isInfinite ? 'on' : 'off';
  allLoaded = false;
  if (observer) observer.disconnect();

  if (isInfinite) {
    $('pagination').innerHTML = '';
    currentPage = 1;
    fetchPage(1, false);
    history.replaceState(null, '', '#infinite');
  } else {
    currentPage = 1;
    fetchPage(1, false);
    history.replaceState(null, '', '');
  }
}

function openPostFromHash() {

  if (m) {
    openPermalink(m[1]);
    return true;
  }
  return false;
}

function _searchAll(q, isTag, label, maxPosts) {
  var all = []; var start = 0; var total = 0; var fetched = 0;
  var max = maxPosts || Infinity;
  var ql = q.toLowerCase();
  var gen = ++_searchGen;
  _searchActive = true;
  if (observer) { observer.disconnect(); observer = null; }
  $('grid').innerHTML = '<div class="loading">Searching…</div>';
  $('pagination').innerHTML = '';
  _tprt('searching' + (maxPosts ? ' up to ' + maxPosts : ' all') + ' posts for ' + label + '...', 'tdim');

  function next() {
    if (gen !== _searchGen) { _searchActive = false; return; }
    var url = 'https://' + BLOG + '.tumblr.com/api/read/json?num=50&start=' + start;
    if (isTag) url += '&tagged=' + encodeURIComponent(q);
    jsonp(url).then(function(data) {
      if (gen !== _searchGen) return;
      total = data['posts-total'] || 0;
      if (data.posts) {
        data.posts.forEach(function(p) {
          postCache.set(p.id, p);
          if (isTag || (extractText(p) + ' ' + (extractTitle(p) || '') + ' ' + (p.tags || []).join(' ')).toLowerCase().indexOf(ql) !== -1) all.push(p);
        });
      }
      fetched += 50;
      _tprt('  ' + Math.min(fetched, total) + ' / ' + total + ' scanned, ' + all.length + ' matches', 'tdim');
      if (all.length) {
        var sorted = all.slice().sort(function(x, y) { return (y['unix-timestamp'] || 0) - (x['unix-timestamp'] || 0); });
        _results = sorted;
        $('grid').innerHTML = sorted.map(tileHtml).join('');
        if (!isTextOnly) {
          applyMasonry();
          $('grid').querySelectorAll('img').forEach(function(img) {
            if (!img.complete) img.addEventListener('load', applyMasonry, { once: true });
          });
          setTimeout(applyMasonry, 300);
        }
        $('total').textContent = all.length + ' matches so far...';
      }
      if (fetched < total && fetched < max) { start += 50; setTimeout(next, 250); }
      else {
        _results = all;
        if (!all.length) {
          $('grid').innerHTML = '<div class="error">No results for ' + label + '</div>';
          _tprt('no matches found in ' + total + ' posts.', 'tdim');
        }
        $('total').textContent = all.length + ' results for ' + label;
        _tprt('done. ' + all.length + ' results for ' + label + ' (' + total + ' scanned).', 'tbold');
        _searchActive = false;
      }
    }).catch(function() { _tprt('error, retrying...', 'terr'); setTimeout(next, 1000); });
  }
  next();
}
