<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚔ Bushido Blade</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0d0d1a;
  display:flex;justify-content:center;align-items:center;
  height:100vh;overflow:hidden;font-family:'Georgia',serif;user-select:none
}
#container{
  position:relative;
  background:linear-gradient(135deg,#1a0a0a,#0d0d1a);
  border-radius:16px;padding:12px;
  box-shadow:0 0 60px rgba(200,50,50,.15),0 0 120px rgba(100,50,150,.1);
  border:1px solid rgba(200,100,100,.1);
  width:fit-content;max-width:calc(100vw - 24px);max-height:calc(100vh - 24px);
  margin:auto
}
#c{
  display:block;border-radius:8px;
  width:100%;height:auto;
  max-width:1280px;max-height:720px;
  aspect-ratio:16/9;
  image-rendering:pixelated;image-rendering:crisp-edges;
  background:#000;cursor:crosshair
}
#ui{
  position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;border-radius:8px;
  font-family:'Georgia',serif
}
#healthBar{
  position:absolute;top:14px;left:14px;
  display:flex;align-items:center;gap:4px;
}
#healthBar .heart{font-size:18px;filter:drop-shadow(0 0 6px rgba(255,50,50,.6))}
#healthBar .heart.lost{opacity:.2;filter:none}
#scoreDisp{
  position:absolute;top:14px;right:14px;
  color:#f0d8a0;font-size:16px;font-weight:bold;
  text-shadow:0 0 15px rgba(200,150,50,.3),0 2px 4px rgba(0,0,0,.8);
  text-align:right;line-height:1.3
}
#scoreDisp small{display:block;font-size:10px;color:rgba(240,216,160,.4);font-weight:normal}
#topScoreDisp{
  position:absolute;top:46px;right:14px;
  color:rgba(240,216,160,.3);font-size:10px;
  text-shadow:0 0 10px rgba(200,150,50,.15),0 1px 2px rgba(0,0,0,.6);
  text-align:right;line-height:1.3
}
#comboDisp{
  position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);
  color:#ffd700;font-weight:bold;text-align:center;
  text-shadow:0 0 30px rgba(255,215,0,.6),0 0 60px rgba(255,215,0,.3);
  opacity:0;transition:none;pointer-events:none;white-space:pre;line-height:1.3
}
#comboDisp.show{opacity:1}
#cdQ,#cdE{
  position:absolute;bottom:12px;
  width:42px;height:42px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:bold;color:#fff;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  text-shadow:0 1px 3px rgba(0,0,0,.5)
}
#cdQ{left:12px;border-color:rgba(100,180,255,.15)}
#cdE{left:62px;border-color:rgba(255,180,100,.15)}
#cdQ .key,#cdE .key{
  position:absolute;top:-16px;left:50%;transform:translateX(-50%);
  font-size:9px;color:rgba(255,255,255,.2);letter-spacing:1px
}
#pauseOverlay,#gameOverOverlay{
  position:absolute;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.75);display:none;
  align-items:center;justify-content:center;
  border-radius:8px;flex-direction:column;gap:6px;
  backdrop-filter:blur(4px);pointer-events:auto;z-index:10
}
#pauseOverlay.show,#gameOverOverlay.show{display:flex}
#pauseOverlay h2,#gameOverOverlay h2{
  color:#f0d8a0;font-size:32px;letter-spacing:5px;
  text-shadow:0 0 30px rgba(200,150,50,.25);margin-bottom:6px
}
#pauseOverlay p,#gameOverOverlay p{
  color:rgba(240,216,160,.5);font-size:13px;letter-spacing:1px
}
#gameOverOverlay .finalScore{color:#ffd700;font-size:24px;margin:6px 0}
#gameOverOverlay .topScore{color:rgba(255,215,0,.4);font-size:12px}
#controls{
  position:absolute;bottom:12px;right:12px;
  color:rgba(255,255,255,.15);font-size:9px;
  text-align:right;line-height:1.5;letter-spacing:.5px
}
#nanoDisp{
  position:absolute;left:16px;top:50%;transform:translateY(-50%);
  max-width:40%;pointer-events:none;z-index:15;
  font-family:'SF Mono',Consolas,monospace;
  font-size:11px;line-height:1.6;color:#20ff20;
  text-shadow:0 0 10px rgba(32,255,32,0.3);
  white-space:pre-wrap;word-break:break-word;
  opacity:0;transition:opacity .3s
}
#nanoDisp.show{opacity:1}

#mobile-controls{position:absolute;inset:0;pointer-events:none;z-index:10;display:none}
@media(max-width:1024px){
  #mobile-controls{display:block}
  #container{width:100vw;padding:0;border-radius:0;overflow:hidden}
  #container #c{width:100vw;height:auto;aspect-ratio:16/9;border-radius:0;max-height:100dvh;object-fit:contain}
  #controls{display:none}
  #cdQ,#cdE{width:34px;height:34px;font-size:12px;bottom:6px}
  #cdQ{left:6px}#cdE{left:46px}
  #healthBar{top:6px;left:6px}
  #healthBar .heart{font-size:14px}
  #scoreDisp{top:6px;right:6px;font-size:13px}
  #topScoreDisp{top:32px;right:6px}
}
.mc-btn{
  position:absolute;pointer-events:auto;
  width:52px;height:52px;border-radius:50%;
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.14);
  color:rgba(255,255,255,0.7);font-size:20px;display:flex;
  align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;touch-action:none;user-select:none
}
.mc-btn:active{background:rgba(255,255,255,0.2)}
#mc-up{left:70px;bottom:170px}
#mc-left{left:10px;bottom:115px}
#mc-right{left:130px;bottom:115px}
#mc-down{left:70px;bottom:60px}
#mc-tl{left:10px;bottom:170px;width:44px;height:44px;font-size:16px}
#mc-tr{left:130px;bottom:170px;width:44px;height:44px;font-size:16px}
#mc-q-attack{right:70px;bottom:170px;background:rgba(100,180,255,0.12);border-color:rgba(100,180,255,0.3);font-size:13px;font-weight:700}
#mc-q-attack:active{background:rgba(100,180,255,0.3)}
#mc-e-attack{right:10px;bottom:115px;background:rgba(255,180,100,0.12);border-color:rgba(255,180,100,0.3);font-size:13px;font-weight:700}
#mc-e-attack:active{background:rgba(255,180,100,0.35)}
#mc-jump{right:10px;bottom:170px;width:44px;height:44px;font-size:16px}
#mc-run{right:70px;bottom:60px;width:44px;height:44px;font-size:11px;font-weight:700}
#mc-pause{right:130px;bottom:60px;width:44px;height:44px;font-size:14px}
#mc-nano{position:absolute;pointer-events:auto;right:10px;bottom:6px;width:36px;height:28px;border-radius:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.35);font-size:10px;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;touch-action:none;user-select:none}
#mc-nano:active{background:rgba(255,255,255,0.15)}
#mc-restart{position:absolute;pointer-events:auto;top:42px;right:8px;width:30px;height:30px;border-radius:6px;background:rgba(255,80,80,0.06);border:1px solid rgba(255,80,80,0.1);color:rgba(255,120,120,0.35);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;touch-action:none;user-select:none}
#mc-restart:active{background:rgba(255,80,80,0.18)}
@media(max-width:500px){
  .mc-btn{width:44px;height:44px;font-size:16px}
  #mc-up{left:54px;bottom:146px}
  #mc-left{left:6px;bottom:98px}
  #mc-right{left:102px;bottom:98px}
  #mc-down{left:54px;bottom:50px}
  #mc-tl{left:6px;bottom:146px;width:36px;height:36px;font-size:14px}
  #mc-tr{left:102px;bottom:146px;width:36px;height:36px;font-size:14px}
  #mc-q-attack{right:54px;bottom:146px;font-size:11px}
  #mc-e-attack{right:6px;bottom:98px;font-size:11px}
  #mc-jump{right:6px;bottom:146px;width:36px;height:36px;font-size:14px}
  #mc-run{right:54px;bottom:50px;width:36px;height:36px;font-size:10px}
  #mc-pause{right:102px;bottom:50px;width:36px;height:36px;font-size:12px}
  #mc-nano{right:6px;bottom:4px;width:32px;height:24px;font-size:9px}
}

</style>
</head>
<body>
<div id="container">
  <canvas id="c"></canvas>
  <div id="ui">
    <div id="healthBar"></div>
    <div id="scoreDisp">0 <small>score</small></div>
    <div id="topScoreDisp"></div>
    <div id="comboDisp"></div>
    <div id="cdQ"><span class="key">Q</span><span id="qLabel">←</span></div>
    <div id="cdE"><span class="key">E</span><span id="eLabel">→</span></div>
    <div id="controls">WASD move · ←→ turn · Shift run · Space jump · Q/E slash · Esc pause · R retire · Enter nano</div>
    <div id="nanoDisp"></div>
    <div id="pauseOverlay">
      <h2>— PAUSED —</h2>
      <p>Press Esc to resume</p>
    </div>
    <div id="gameOverOverlay">
      <h2 id="endTitle">— FALLEN —</h2>
      <div class="finalScore" id="finalScore">0</div>
      <div class="topScore" id="topScoreMsg"></div>
      <p style="margin-top:10px">Press R to restart</p>
    </div>
    </div>
  <div id="mobile-controls">
    <div class="mc-btn" id="mc-up">▲</div>
    <div class="mc-btn" id="mc-left">◀</div>
    <div class="mc-btn" id="mc-down">▼</div>
    <div class="mc-btn" id="mc-right">▶</div>
    <div class="mc-btn" id="mc-tl">↺</div>
    <div class="mc-btn" id="mc-tr">↻</div>
    <div class="mc-btn" id="mc-q-attack">←⚔</div>
    <div class="mc-btn" id="mc-e-attack">⚔→</div>
    <div class="mc-btn" id="mc-jump">⤴</div>
    <div class="mc-btn" id="mc-run">RUN</div>
    <div class="mc-btn" id="mc-pause">⏸</div>
    <div id="mc-nano">⏎</div>
    <div id="mc-toggle" style="position:absolute;top:8px;right:8px;pointer-events:auto;width:30px;height:30px;border-radius:6px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.5);font-size:16px;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;touch-action:none;user-select:none;z-index:20">⌨</div>
    <div id="mc-restart">R</div>
  </div>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const W=960,H=540;
canvas.width=W;canvas.height=H;

// === CONFIG ===
const MAP_W=50,MAP_H=50,T=1;
const FOV=Math.PI/3;
const MOVE_SPD=0.045;
const ROT_SPD=0.03;
const JUMP_VEL=0.08;
const GRAVITY=0.004;
const MAX_HP=5;
const ENEMY_BASE_SPAWN=100;

// === UTILITIES ===
function rand(a,b){return a+Math.random()*(b-a)}
function randInt(a,b){return Math.floor(rand(a,b+1))}
function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v))}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}

// === STATE ===
const state={
  paused:false,gameOver:false,retired:false,
  score:0,combo:0,comboTimer:0,
  bestScore:0,topScores:[],
  spawnTimer:0,difficulty:1,totalKills:0,wave:1,time:0,
  shake:{x:0,y:0,i:0,d:0},
  enemyTypes:{ronin:0,samurai:0,ninja:0}
};
const pl={
  x:25,y:25,dir:0,
  planeX:0,planeY:0.58,
  hp:MAX_HP,maxHp:MAX_HP,
  z:0,zVel:0,onGround:true,
  slashTmr:0,slashType:null,
  hurtTmr:0,iFrames:0,
  bob:0,alive:true
};
pl.dir=-Math.PI/2;
pl.planeX=Math.cos(pl.dir+Math.PI/2)*Math.tan(FOV/2);
pl.planeY=Math.sin(pl.dir+Math.PI/2)*Math.tan(FOV/2);
let map=[],enemies=[],particles=[],decorations=[],pickups=[],zBuffer=[];
let keys={},tick=0;

// === MAP ===
function genMap(){
  map=[];
  for(let y=0;y<MAP_W;y++){map[y]=[];for(let x=0;x<MAP_H;x++){map[y][x]=x===0||y===0||x===MAP_W-1||y===MAP_H-1?1:0;}}
  // Interior walls - columns and structures
  for(let i=0;i<30;i++){
    let x,y,a=0;
    do{x=randInt(2,MAP_W-3);y=randInt(2,MAP_H-3);a++;}
    while((map[y][x]!==0||dist({x,y},{x:MAP_W/2,y:MAP_H/2})<6)&&a<50);
    if(a<50){
      if(Math.random()<.5)map[y][x]=1;
      else{for(let dy=0;dy<2;dy++)for(let dx=0;dx<2;dx++)if(y+dy<MAP_H-1&&x+dx<MAP_W-1)map[y+dy][x+dx]=1;}
    }
  }
  // Clear spawn area
  const cx=Math.floor(MAP_W/2),cy=Math.floor(MAP_H/2);
  for(let dy=-3;dy<=3;dy++)for(let dx=-3;dx<=3;dx++)
    if(cy+dy>0&&cy+dy<MAP_H-1&&cx+dx>0&&cx+dx<MAP_W-1)map[cy+dy][cx+dx]=0;
  // Add some open corridors
  for(let i=0;i<8;i++){
    const dir=randInt(0,3),pos=randInt(4,MAP_W-5);
    if(dir===0)for(let x=4;x<MAP_W-4;x++)if(map[pos][x]===1&&Math.random()<.6)map[pos][x]=0;
    if(dir===1)for(let x=4;x<MAP_W-4;x++)if(map[pos][x]===1&&Math.random()<.6)map[pos][x]=0;
    if(dir===2)for(let y=4;y<MAP_H-4;y++)if(map[y][pos]===1&&Math.random()<.6)map[y][pos]=0;
    if(dir===3)for(let y=4;y<MAP_H-4;y++)if(map[y][pos]===1&&Math.random()<.6)map[y][pos]=0;
  }
  // Decorative pillars
  decorations=[];
  for(let y=2;y<MAP_H-2;y++)for(let x=2;x<MAP_W-2;x++)
    if(map[y][x]===0&&Math.random()<.008&&dist({x,y},{x:MAP_W/2,y:MAP_H/2})>5)
      decorations.push({x:x+0.5,y:y+0.5,ty:'pillar'});
  // Wall decorations
  for(let y=2;y<MAP_H-2;y++)for(let x=2;x<MAP_W-2;x++)
    if(map[y][x]===1&&Math.random()<.03){
      const adj=map[y-1][x]===0||map[y+1][x]===0||map[y][x-1]===0||map[y][x+1]===0;
      if(adj)decorations.push({x:x+0.5,y:y+0.5,ty:'torch'});
    }
}
function walkable(x,y){
  return x>=0.2&&y>=0.2&&x<MAP_W-0.2&&y<MAP_H-0.2&&
    map[Math.floor(y)][Math.floor(x)]<1;
}

// === SPRITES ===
function drawSamurai(cx,cy,w,h,type,dir,anim){
  const g=ctx;
  if(type==='player'){
    g.fillStyle='#1a2a5a';
    g.fillRect(cx-w/2,cy-h*0.45,w*0.8,h*0.5);
    g.strokeStyle='#d4a440';g.lineWidth=2;
    g.strokeRect(cx-w/2,cy-h*0.45,w*0.8,h*0.5);
    g.fillStyle='#f5d0a9';
    g.beginPath();g.arc(cx,cy-h*0.6,w*0.25,0,Math.PI*2);g.fill();
    g.fillStyle='#0a0a0a';
    g.beginPath();g.ellipse(cx,cy-h*0.75,w*0.12,w*0.18,0,0,Math.PI*2);g.fill();
    g.fillStyle='#d4a440';
    g.fillRect(cx-w*0.15,cy-h*0.02,w*0.3,h*0.03);
  }else if(type==='ronin'){
    g.fillStyle='#5a1a1a';
    g.fillRect(cx-w/2,cy-h*0.4,w*0.8,h*0.45);
    g.fillStyle='#f5d0a9';
    g.beginPath();g.arc(cx,cy-h*0.55,w*0.22,0,Math.PI*2);g.fill();
    g.fillStyle='#8a7a5a';
    g.beginPath();g.ellipse(cx,cy-h*0.65,w*0.35,w*0.12,0,0,Math.PI*2);g.fill();
    g.fillStyle='#1a1a1a';
    g.fillRect(cx-w*0.18,cy-h*0.55,w*0.1,6);
    g.fillRect(cx+w*0.08,cy-h*0.55,w*0.1,6);
  }else if(type==='samurai'){
    g.fillStyle='#8a1a1a';
    g.fillRect(cx-w/2,cy-h*0.45,w*0.85,h*0.5);
    g.strokeStyle='#4a4a4a';g.lineWidth=2;
    g.strokeRect(cx-w/2,cy-h*0.45,w*0.85,h*0.5);
    g.fillStyle='#f5d0a9';
    g.beginPath();g.arc(cx,cy-h*0.6,w*0.25,0,Math.PI*2);g.fill();
    g.fillStyle='#4a4a4a';
    g.beginPath();g.arc(cx,cy-h*0.62,w*0.32,Math.PI,0);g.fill();
    g.fillStyle='#d4a440';
    g.beginPath();g.moveTo(cx,cy-h*0.82);g.lineTo(cx-5,cy-h*0.68);g.lineTo(cx+5,cy-h*0.68);g.closePath();g.fill();
    g.fillStyle='#ff4a4a';
    g.beginPath();g.arc(cx-w*0.1,cy-h*0.6,3,0,Math.PI*2);g.fill();
    g.beginPath();g.arc(cx+w*0.1,cy-h*0.6,3,0,Math.PI*2);g.fill();
  }else if(type==='ninja'){
    g.fillStyle='#1a1a2a';
    g.fillRect(cx-w/2,cy-h*0.4,w*0.75,h*0.45);
    g.fillStyle='#2a2a3a';
    g.beginPath();g.arc(cx,cy-h*0.55,w*0.22,0,Math.PI*2);g.fill();
    g.fillStyle='#0a0a1a';
    g.fillRect(cx-w*0.22,cy-h*0.65,w*0.44,h*0.2);
    g.fillStyle='#ff6a4a';
    g.fillRect(cx-w*0.14,cy-h*0.6,w*0.1,3);
    g.fillRect(cx+w*0.04,cy-h*0.6,w*0.1,3);
  }
}
function createSprite(type,dir){
  const c=document.createElement('canvas');
  c.width=40;c.height=60;
  const g=c.getContext('2d');
  drawSamurai(g,20,60,40,60,type,dir,0);
  // Katana
  g.save();g.translate(20,28);
  g.fillStyle='#c0c0c0';
  g.fillRect(0,-2,24,3);
  g.fillStyle='#2a1a0a';
  g.fillRect(-8,-1,7,3);
  g.fillStyle='#d4a440';
  g.fillRect(-1,-3,2,7);
  g.restore();
  return c;
}

// === RAYCASTER ===
function castRay(rayAngle){
  rayAngle=rayAngle%(Math.PI*2);if(rayAngle<0)rayAngle+=Math.PI*2;
  const sin=Math.sin(rayAngle),cos=Math.cos(rayAngle);
  const deltaDistX=cos===0?1e10:Math.abs(1/cos);
  const deltaDistY=sin===0?1e10:Math.abs(1/sin);
  let mapX=Math.floor(pl.x),mapY=Math.floor(pl.y);
  let stepX,stepY,sideDistX,sideDistY;
  if(cos<0){stepX=-1;sideDistX=(pl.x-mapX)*deltaDistX;}
  else{stepX=1;sideDistX=(mapX+1-pl.x)*deltaDistX;}
  if(sin<0){stepY=-1;sideDistY=(pl.y-mapY)*deltaDistY;}
  else{stepY=1;sideDistY=(mapY+1-pl.y)*deltaDistY;}
  let hit=0,side=0;
  while(hit===0){
    if(sideDistX<sideDistY){sideDistX+=deltaDistX;mapX+=stepX;side=0;}
    else{sideDistY+=deltaDistY;mapY+=stepY;side=1;}
    if(mapX<0||mapX>=MAP_W||mapY<0||mapY>=MAP_H){hit=1;break;}
    if(map[mapY][mapX]>0)hit=1;
  }
  let perpDist;
  if(side===0)perpDist=(mapX-pl.x+(1-stepX)/2)/cos;
  else perpDist=(mapY-pl.y+(1-stepY)/2)/sin;
  if(perpDist<0.01)perpDist=0.01;
  const wallVal=mapX>=0&&mapX<MAP_W&&mapY>=0&&mapY<MAP_H?map[mapY][mapX]:1;
  return {perpDist,side,wallX:side===0?pl.y+perpDist*sin:pl.x+perpDist*cos,wallVal,mapX,mapY};
}

function renderScene(){
  zBuffer=[];
  const zOff=Math.floor(pl.z*50);
  // Ceiling
  const cg=ctx.createLinearGradient(0,0,0,H/2+zOff);
  cg.addColorStop(0,'#0a0a15');cg.addColorStop(1,'#1a1a2a');
  ctx.fillStyle=cg;ctx.fillRect(0,0,W,Math.floor(H/2)+zOff);
  // Floor
  const fg=ctx.createLinearGradient(0,Math.floor(H/2)+zOff,0,H);
  fg.addColorStop(0,'#2a3a1a');fg.addColorStop(0.5,'#2a2a15');fg.addColorStop(1,'#1a1a0a');
  ctx.fillStyle=fg;ctx.fillRect(0,Math.floor(H/2)+zOff,W,Math.ceil(H/2)-zOff);
  // Raycast
  const stripeW=4;
  for(let col=0;col<W;col+=stripeW){
    const cameraX=2*col/W-1;

// === SPRITE RENDERING ===
function renderSprites(){
  const sprites=[];
  enemies.forEach(e=>{if(e.hp<=0)return;const d=dist(pl,e);if(d>30)return;sprites.push({x:e.x,y:e.y,d,ty:'enemy',e});});
  pickups.forEach(p=>{if(p.life<=0)return;const d=dist(pl,p);if(d>30)return;sprites.push({x:p.x,y:p.y,d,ty:'pickup',p});});
  sprites.sort((a,b)=>b.d-a.d);
  const zOff=Math.floor(pl.z*50);
  sprites.forEach(s=>{
    const dx=s.x-pl.x,dy=s.y-pl.y;
    const invDet=1/(pl.planeX*Math.sin(pl.dir)-Math.cos(pl.dir)*pl.planeY);
    const transformX=invDet*(Math.sin(pl.dir)*dx-Math.cos(pl.dir)*dy);
    const transformY=invDet*(-pl.planeY*dx+pl.planeX*dy);
    if(transformY<=0)return;
    const spriteScreenX=Math.floor(W/2*(1+transformX/transformY));
    const spriteH=Math.abs(Math.floor(H/transformY));
    const drawStartY=Math.floor(-spriteH/2+H/2+zOff);
    const drawEndY=Math.floor(spriteH/2+H/2+zOff);
    const drawStartX=Math.floor(-spriteH/2+spriteScreenX);
    const drawEndX=Math.floor(spriteH/2+spriteScreenX);
    if(s.ty==='enemy'&&!(s.e.hurtTmr>0&&s.e.hurtTmr%2===0)){
      const sc=getSpriteCanvas(s.e.type);
      const centerStripe=Math.floor((drawStartX+drawEndX)/2);
      if(centerStripe>=0&&centerStripe<W&&transformY<zBuffer[centerStripe]){
        ctx.drawImage(sc,drawStartX,drawStartY,Math.max(1,drawEndX-drawStartX),Math.max(1,drawEndY-drawStartY));
      }
      // Attack slash arc
      if(s.e.attackAnim>0){
        const ap=s.e.attackAnim/10,p=1-ap;
        ctx.save();
        ctx.globalAlpha=ap*0.5;
        ctx.strokeStyle='rgba(220,200,180,0.5)';
        ctx.lineWidth=1+p*2;
        ctx.shadowColor='rgba(220,200,180,0.3)';ctx.shadowBlur=8;
        const r=20+transformY*10,cy2=drawStartY+(drawEndY-drawStartY)*0.3;
        ctx.beginPath();ctx.arc(spriteScreenX,cy2,r,-0.8-p*0.6,0.8+p*0.6);ctx.stroke();
        ctx.shadowBlur=0;ctx.globalAlpha=1;
        ctx.restore();
      }
      // Health bar
      if(s.e.hp<s.e.maxHp){
        const bw=Math.min(60,drawEndX-drawStartX);
        const barY=drawStartY-6;
        ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(spriteScreenX-bw/2-1,barY-1,bw+2,5);
        ctx.fillStyle=s.e.hp>1?'#44cc44':'#ff4444';ctx.fillRect(spriteScreenX-bw/2,barY,Math.floor(bw*s.e.hp/s.e.maxHp),3);
      }
    }else if(s.ty==='pickup'){
      const bob=Math.sin(state.time*0.06+s.p.x)*4;
      const sc=getPickupCanvas();
      const centerStripe=Math.floor((drawStartX+drawEndX)/2);
      if(centerStripe>=0&&centerStripe<W&&transformY<zBuffer[centerStripe]){
        ctx.drawImage(sc,drawStartX,drawStartY+bob,Math.max(1,drawEndX-drawStartX),Math.max(1,drawEndY-drawStartY));
      }
    }
  });
}

// === WEAPON DRAWING ===
function drawWeapon(){
  const cx=W*0.52,cy=H+5;
  let bobX=0,bobY=0;
  if(pl.alive&&(keys['w']||keys['s']||keys['a']||keys['d'])){
    bobY=Math.sin(pl.bob)*6;
    bobX=Math.sin(pl.bob*0.7)*3;
  }
  if(pl.z>0)bobY-=pl.z*40;
  let rot=0.12,sOffX=0,sOffY=0,swingA=0;
  if(pl.slashTmr>0){
    const p=1-pl.slashTmr/8;
    if(pl.slashType==='q'){
      rot=0.12-p*1.8;
      sOffX=p*60;sOffY=-p*30;
      swingA=p;
    }else{
      rot=0.12+p*1.0;
      sOffY=-p*60;
      swingA=p;
    }
  }
  const s=3.2;
  ctx.save();
  ctx.translate(cx+bobX+sOffX,cy+bobY+sOffY);
  ctx.rotate(rot);
  // Shadow on ground
  ctx.fillStyle='rgba(0,0,0,0.08)';
  ctx.beginPath();ctx.ellipse(0,8,50*s,8*s,0,0,Math.PI*2);ctx.fill();

  // ===== BLADE (NAGASA) =====
  ctx.shadowColor='rgba(180,180,200,0.15)';ctx.shadowBlur=20;
  const bladeGrad=ctx.createLinearGradient(0,0,0,-80*s);
  bladeGrad.addColorStop(0,'#d0d0d8');bladeGrad.addColorStop(0.3,'#c8c8d0');
  bladeGrad.addColorStop(0.6,'#b8b8c0');bladeGrad.addColorStop(1,'#a8a8b0');
  ctx.fillStyle=bladeGrad;
  ctx.beginPath();
  ctx.moveTo(-3.5*s,-2*s);
  ctx.quadraticCurveTo(-2.5*s,-35*s,0,-72*s);
  ctx.quadraticCurveTo(0.5*s,-78*s,2.5*s,-74*s);
  ctx.quadraticCurveTo(4*s,-55*s,4.5*s,-30*s);
  ctx.quadraticCurveTo(4.5*s,-10*s,3.5*s,-2*s);
  ctx.closePath();ctx.fill();
  ctx.shadowBlur=0;

  // Blade edge (ha)
  ctx.fillStyle='rgba(255,255,255,0.15)';
  ctx.beginPath();
  ctx.moveTo(1.5*s,-5*s);
  ctx.quadraticCurveTo(2.5*s,-30*s,2*s,-68*s);
  ctx.lineTo(0.5*s,-68*s);
  ctx.quadraticCurveTo(1.5*s,-30*s,0.5*s,-5*s);
  ctx.closePath();ctx.fill();

  // Hamon (edge temper pattern)
  ctx.fillStyle='rgba(255,255,255,0.04)';
  ctx.beginPath();
  ctx.moveTo(-2.5*s,-8*s);
  for(let i=0;i<20;i++){
    const hy=-10*s-i*3.2*s;
    ctx.lineTo(-2.5*s+Math.sin(i*1.8)*1.8*s,hy);
  }
  ctx.lineTo(3*s,-72*s);
  ctx.lineTo(4*s,-2*s);
  ctx.closePath();ctx.fill();

  // Blade ridge line (shinogi)
  ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,-5*s);ctx.quadraticCurveTo(-1*s,-35*s,0.5*s,-70*s);ctx.stroke();

  // ===== TSUBA (GUARD) =====
  ctx.fillStyle='#4a3520';ctx.fillRect(-7*s,-1*s,14*s,4*s);
  ctx.fillStyle='#d4a440';ctx.fillRect(-6*s,0,12*s,2*s);
  ctx.fillStyle='#e8c860';ctx.fillRect(-5*s,0.5,10*s,1);
  // Tsuba cutouts
  ctx.fillStyle='#1a1a0a';ctx.fillRect(-5*s,1,1.5*s,1.5*s);
  ctx.fillRect(3.5*s,1,1.5*s,1.5*s);

  // ===== HANDLE (TSUKA) =====
  ctx.fillStyle='#1a0a00';ctx.fillRect(-4*s,4*s,8*s,-38*s);
  // Itomaki (handle wrapping)
  ctx.fillStyle='#d4a440';
  for(let i=0;i<7;i++){
    const wy=3*s-i*5.5*s;
    const phase=i%2;
    ctx.fillRect(-3.5*s+phase*2,wy-1,7*s,2.5);
    if(i%2===0){
      ctx.fillStyle='#1a0a00';ctx.fillRect(-1.5*s,wy-1,3*s,1.5);
    }
    ctx.fillStyle='#d4a440';
  }
  // Same (ray skin) visible between wraps
  ctx.fillStyle='rgba(255,255,255,0.06)';
  for(let i=0;i<6;i++){const wy=3.5*s-i*5.5*s-2;ctx.fillRect(-2*s,wy,4*s,1.5);}

  // ===== HAND (KATATE MOCHI) =====
  // Forearm
  ctx.fillStyle='#2a1a1a';ctx.fillRect(-3*s,28*s,6*s,18*s);
  // Sleeve
  ctx.fillStyle='#1a2a5a';ctx.fillRect(-4.5*s,26*s,9*s,8*s);
  ctx.fillStyle='#d4a440';ctx.fillRect(-4.5*s,26*s,9*s,1);
  // Fingers gripping handle
  ctx.fillStyle='#e8c8a0';
  for(let i=0;i<3;i++)ctx.fillRect(-5*s+2*i,3*s+2,2*s,5*s);
  // Thumb
  ctx.fillStyle='#e8c8a0';ctx.fillRect(2.5*s,4*s+2,2.5*s,4*s);
  // Knuckles
  ctx.fillStyle='#d4b090';ctx.fillRect(-5*s,3*s,6*s,1.5);

  // ===== KASHIRA (POMMEL) =====
  ctx.fillStyle='#d4a440';ctx.fillRect(-3*s,-35*s,6*s,3*s);
  ctx.fillStyle='#e8c860';ctx.fillRect(-2.5*s,-34*s,5*s,1);

  ctx.restore();

  // === SLASH ARC ===
  if(pl.slashTmr>0){
    const p=1-pl.slashTmr/8,alpha=1-p;
    ctx.save();
    ctx.globalAlpha=alpha*0.55;
    ctx.strokeStyle=pl.slashType==='q'?'rgba(170,221,255,0.5)':'rgba(255,221,170,0.5)';
    ctx.lineWidth=2+p*7;
    ctx.shadowColor=pl.slashType==='q'?'rgba(170,221,255,.35)':'rgba(255,221,170,.35)';
    ctx.shadowBlur=25;
    const r=100+p*70,sA=-0.4-p*1.5,eA=0.4+p*1.5;
    ctx.beginPath();ctx.arc(W*0.5,H*0.55,r,sA,eA);ctx.stroke();
    ctx.shadowBlur=0;ctx.globalAlpha=1;
    if(tick%2===0){
      const a=sA+p*3;
      for(let i=0;i<2;i++){
        const off=(i-0.5)*rand(-15,15);
        particles.push({
          x:W*0.5+Math.cos(a+i*0.1)*(r-5)+off,
          y:H*0.55+Math.sin(a+i*0.1)*(r-5)+off*0.3,
          vx:rand(-1.5,1.5),vy:rand(-1.5,1.5),
          life:4+rand(0,6),max:10,sz:2+rand(0,3),
          col:pl.slashType==='q'?'#aaddff':'#ffddaa',ty:'swing'
        });
      }
    }
    ctx.restore();
  }
}

// === COMBAT ===
function doSlash(type){
  if(pl.slashTmr>0||!pl.alive||state.paused||state.gameOver)return;
  pl.slashTmr=8;pl.slashType=type;sndSlash();
  const range=type==='q'?2.2:2.8;
  const arc=type==='q'?1.0:0.6;
  const dmg=type==='e'?2:1;
  let hitAny=false;
  enemies.forEach(e=>{
    if(e.hp<=0)return;
    const d=dist(pl,e);
    if(d>range)return;
    const ang=Math.atan2(e.y-pl.y,e.x-pl.x);
    let diff=ang-pl.dir;
    while(diff>Math.PI)diff-=2*Math.PI;
    while(diff<-Math.PI)diff+=2*Math.PI;
    if(Math.abs(diff)>arc/2+0.2)return;
    hitAny=true;
    e.hp-=dmg;e.hurtTmr=8;sndHit();
    e.x+=Math.cos(ang)*0.3;e.y+=Math.sin(ang)*0.3;
    // Hit particles
    for(let i=0;i<6;i++){
      const a=ang+rand(-.6,.6),sp=rand(.02,.05);
      particles.push({x:e.x,y:e.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
        life:8+rand(0,8),max:16,sz:2+rand(0,3),col:'#ffdd44',ty:'hit'});
    }
    state.shake.i=2;state.shake.d=60;
    if(e.hp<=0)killEnemy(e);
  });
  if(hitAny)state.shake.i=3;state.shake.d=80;
}
function killEnemy(e){
  e.hp=0;sndKill();
  for(let i=0;i<16;i++){
    const a=rand(0,Math.PI*2),sp=rand(.01,.05);
    particles.push({x:e.x+rand(-.2,.2),y:e.y+rand(-.2,.2),
      vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:15+rand(0,20),max:35,
      sz:2+rand(0,4),col:'#ff6644',ty:'die'});
  }
  const pts=e.type==='ronin'?100:e.type==='samurai'?200:150;
  state.comboTimer=120;state.combo++;
  const mult=Math.min(state.combo,10);
  state.score+=pts*mult;state.totalKills++;
  state.shake.i=4;state.shake.d=100;
  const cd=document.getElementById('comboDisp');
  if(state.combo>=2){
    cd.textContent=`${mult}x COMBO!\n+${pts*mult}`;
    cd.style.fontSize=Math.min(18+state.combo*2,44)+'px';
    cd.classList.add('show');
    clearTimeout(cd._t);
    cd._t=setTimeout(()=>cd.classList.remove('show'),500);
  }
  if(Math.random()<.2)pickups.push({x:e.x,y:e.y,ty:'hp',life:600});
  state.enemyTypes[e.type]--;
}
function spawnEnemy(){
  if(!pl.alive||state.paused||state.gameOver)return;
  const roll=Math.random();
  let type;
  if(roll<.5||state.difficulty<1.5)type='ronin';
  else if(roll<.8)type='ninja';
  else type='samurai';
  let x,y,a=0;
  do{
    const ang=rand(0,Math.PI*2),r=8+rand(3,8);
    x=pl.x+Math.cos(ang)*r;y=pl.y+Math.sin(ang)*r;
    a++;
  }while((!walkable(x,y)||dist({x,y},pl)<7)&&a<60);
  if(a>=60)return;
  const hp=type==='ronin'?4:type==='samurai'?8:3;
  const spd=type==='ninja'?0.035:type==='ronin'?0.02:0.015;
  const atkR=type==='ninja'?1.5:1.8;
  const atkCd=type==='ninja'?50:type==='ronin'?70:90;
  const atkDmg=type==='ninja'?1:type==='ronin'?1:2;
  enemies.push({x,y,hp,maxHp:hp,type,spd,dir:0,
    atkR,atkCd,atkDmg,atkTmr:randInt(30,atkCd),
    hurtTmr:0,stunTmr:0,attackAnim:0});
  state.enemyTypes[type]++;
}
function playerHit(dmg){
  if(pl.iFrames>0||!pl.alive)return;
  pl.hp-=dmg;pl.hurtTmr=10;pl.iFrames=30;sndHurt();
  state.shake.i=7;state.shake.d=120;
  for(let i=0;i<8;i++){
    const a=rand(0,Math.PI*2),sp=rand(.01,.04);
    particles.push({x:pl.x+rand(-.2,.2),y:pl.y+rand(-.2,.2),
      vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:12+rand(0,12),max:24,
      sz:2+rand(0,3),col:'#ff2222',ty:'die'});
  }
  if(pl.hp<=0){pl.hp=0;pl.alive=false;gameOver(false);}
  updateUI();
}

// === GAME SYSTEMS ===
function gameOver(retired){
  state.gameOver=true;state.retired=retired;
  if(!retired)for(let i=0;i<30;i++){
    const a=rand(0,Math.PI*2),sp=rand(.01,.07);
    particles.push({x:pl.x+rand(-.3,.3),y:pl.y+rand(-.3,.3),
      vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:25+rand(0,25),max:50,
      sz:3+rand(0,5),col:'#ff4422',ty:'die'});
  }
  updateScores();showGameOver(retired);
}
function updateScores(){
  const saved=localStorage.getItem('bushido_scores');
  let scores=saved?JSON.parse(saved):[];
  scores.push({score:state.score,kills:state.totalKills,retired:state.retired,date:Date.now()});
  scores.sort((a,b)=>b.score-a.score);scores=scores.slice(0,10);
  localStorage.setItem('bushido_scores',JSON.stringify(scores));
  state.topScores=scores;if(scores.length>0)state.bestScore=scores[0].score;
}
function showGameOver(retired){
  const ov=document.getElementById('gameOverOverlay');
  document.getElementById('endTitle').textContent=retired?'— RETIRED —':'— FALLEN —';
  document.getElementById('finalScore').textContent=`${state.score} pts`;
  document.getElementById('topScoreMsg').textContent=
    state.topScores.length>0&&state.topScores[0].score===state.score?'★ NEW TOP SCORE! ★':
    `Top: ${state.bestScore}`;
  ov.classList.add('show');
}
function updateUI(){
  const hb=document.getElementById('healthBar');hb.innerHTML='';
  for(let i=0;i<pl.maxHp;i++){
    const h=document.createElement('span');
    h.className='heart'+(i>=pl.hp?' lost':'');h.textContent='♥';hb.appendChild(h);
  }
  document.getElementById('scoreDisp').innerHTML=`${state.score} <small>score</small>`;
  const ts=document.getElementById('topScoreDisp');
  ts.innerHTML=state.bestScore>0?`best ${state.bestScore}`:'';
  const qReady=pl.slashTmr===0||pl.slashType!=='q';
  const eReady=pl.slashTmr===0||pl.slashType!=='e';
  document.getElementById('qLabel').style.opacity=qReady?1:0.3;
  document.getElementById('eLabel').style.opacity=eReady?1:0.3;
}
function loadScores(){
  const saved=localStorage.getItem('bushido_scores');
  if(saved){state.topScores=JSON.parse(saved);if(state.topScores.length>0)state.bestScore=state.topScores[0].score;}
}
function saveState(){
  const data={
    map:map.map(row=>[...row]),
    pl:{x:pl.x,y:pl.y,dir:pl.dir,hp:pl.hp,z:pl.z,iFrames:pl.iFrames},
    state:{score:state.score,combo:state.combo,comboTimer:state.comboTimer,totalKills:state.totalKills,difficulty:state.difficulty,wave:state.wave,time:state.time},
    enemies:enemies.filter(e=>e.hp>0).map(e=>({x:e.x,y:e.y,hp:e.hp,maxHp:e.maxHp,type:e.type,spd:e.spd,dir:e.dir,atkR:e.atkR,atkCd:e.atkCd,atkDmg:e.atkDmg,atkTmr:e.atkTmr})),
    timestamp:Date.now()
  };
  localStorage.setItem('bushido_save',JSON.stringify(data));
}
function loadState(){
  const saved=localStorage.getItem('bushido_save');
  if(!saved)return false;
  try{
    const data=JSON.parse(saved);
    if(data.map){for(let y=0;y<MAP_H&&y<data.map.length;y++)for(let x=0;x<MAP_W&&x<data.map[y].length;x++)map[y][x]=data.map[y][x];}
    decorations=[];
    for(let y=0;y<MAP_H;y++)for(let x=0;x<MAP_W;x++){
      const tile=map[y][x];
      if(tile===0&&Math.random()<.008&&dist({x,y},{x:MAP_W/2,y:MAP_H/2})>5)decorations.push({x:x+0.5,y:y+0.5,ty:'pillar'});
      else if(tile===1&&Math.random()<.03){const adj=map[y-1]&&(map[y-1][x]===0||map[y+1]&&map[y+1][x]===0||map[y][x-1]===0||map[y][x+1]===0);if(adj)decorations.push({x:x+0.5,y:y+0.5,ty:'torch'});}
    }
    Object.assign(pl,data.pl);
    Object.assign(state,data.state);
    pl.planeX=Math.cos(pl.dir+Math.PI/2)*Math.tan(FOV/2);
    pl.planeY=Math.sin(pl.dir+Math.PI/2)*Math.tan(FOV/2);
    enemies.length=0;
    data.enemies.forEach(e=>enemies.push({...e,stunTmr:0,hurtTmr:0}));
    state.paused=true;state.gameOver=false;state.retired=false;
    pl.alive=true;pl.hurtTmr=0;pl.slashTmr=0;pl.slashType=null;
    pl.bob=0;pl.zVel=0;
    document.getElementById('pauseOverlay').classList.add('show');
    document.getElementById('gameOverOverlay').classList.remove('show');
    updateUI();return true;
  }catch(e){return false;}
}
function deleteSave(){localStorage.removeItem('bushido_save');}

// === MINIMAP ===
function drawMinimap(){
  const ms=120,zoom=22,scale=ms/zoom;
  const mx=W-ms-12,my=12;
  ctx.fillStyle='rgba(0,0,0,0.6)';
  ctx.fillRect(mx-2,my-2,ms+4,ms+4);
  ctx.strokeStyle='rgba(200,150,100,0.2)';ctx.lineWidth=1;
  ctx.strokeRect(mx-2,my-2,ms+4,ms+4);
  const startX=Math.max(0,Math.floor(pl.x-zoom/2));
  const startY=Math.max(0,Math.floor(pl.y-zoom/2));
  const endX=Math.min(MAP_W,Math.ceil(pl.x+zoom/2));
  const endY=Math.min(MAP_H,Math.ceil(pl.y+zoom/2));
  for(let y=startY;y<endY;y++)for(let x=startX;x<endX;x++){
    if(map[y][x]>0){
      ctx.fillStyle='rgba(150,120,80,0.5)';
      ctx.fillRect(mx+(x-pl.x)*scale+ms/2,my+(y-pl.y)*scale+ms/2,Math.ceil(scale),Math.ceil(scale));
    }
  }
  enemies.forEach(e=>{
    if(e.hp<=0)return;
    const ex=mx+(e.x-pl.x)*scale+ms/2,ey=my+(e.y-pl.y)*scale+ms/2;
    if(ex<mx-4||ex>mx+ms+4||ey<my-4||ey>my+ms+4)return;
    ctx.fillStyle='rgba(255,50,50,0.7)';
    ctx.beginPath();ctx.arc(ex,ey,Math.max(2,scale*0.4),0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(255,50,50,0.3)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(ex,ey);ctx.lineTo(ex+Math.cos(e.dir)*scale*0.6,ey+Math.sin(e.dir)*scale*0.6);ctx.stroke();
  });
  pickups.forEach(p=>{
    if(p.life<=0)return;
    const px=mx+(p.x-pl.x)*scale+ms/2,py=my+(p.y-pl.y)*scale+ms/2;
    if(px<mx||px>mx+ms||py<my||py>my+ms)return;
    ctx.fillStyle='rgba(255,68,102,0.5)';
    ctx.beginPath();ctx.arc(px,py,Math.max(1,scale*0.3),0,Math.PI*2);ctx.fill();
  });
  ctx.fillStyle='#ffd700';
  ctx.beginPath();ctx.arc(mx+ms/2,my+ms/2,Math.max(2.5,scale*0.5),0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#ffd700';ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(mx+ms/2,my+ms/2);
  ctx.lineTo(mx+ms/2+Math.cos(pl.dir)*scale*0.8,my+ms/2+Math.sin(pl.dir)*scale*0.8);
  ctx.stroke();
  ctx.fillStyle='rgba(255,215,0,0.3)';
  const fovLeft=pl.dir-FOV/2,fovRight=pl.dir+FOV/2;
  ctx.beginPath();ctx.moveTo(mx+ms/2,my+ms/2);
  ctx.lineTo(mx+ms/2+Math.cos(fovLeft)*scale*1.2,my+ms/2+Math.sin(fovLeft)*scale*1.2);
  ctx.lineTo(mx+ms/2+Math.cos(fovRight)*scale*1.2,my+ms/2+Math.sin(fovRight)*scale*1.2);
  ctx.closePath();ctx.fill();
}

// === RENDER ===
function render(){
  if(state.shake.d>0){
    state.shake.x=(Math.random()-0.5)*state.shake.i;
    state.shake.y=(Math.random()-0.5)*state.shake.i;
    state.shake.d--;
  }else{state.shake.x=0;state.shake.y=0;}
  ctx.save();
  ctx.translate(state.shake.x,state.shake.y);
  renderScene();
  renderSprites();
  // Particles in 3D space
  particles.forEach(p=>{
    const dx=p.x-pl.x,dy=p.y-pl.y,d=Math.hypot(dx,dy);
    if(d>15||d<0.3)return;
    const ang=Math.atan2(dy,dx);
    let diff=ang-pl.dir;
    while(diff>Math.PI)diff-=2*Math.PI;
    while(diff<-Math.PI)diff+=2*Math.PI;
    if(Math.abs(diff)>FOV/2+0.1)return;
    const sx=(diff/(FOV/2)+1)*W/2;
    const sz=Math.max(0.5,(p.sz*4)/d*(H/80));
    const sy=H/2-Math.ceil(H*0.1/d)+Math.floor(pl.z*50);
    const a=p.life/p.max||0;
    ctx.globalAlpha=clamp(a,0,1);
    ctx.shadowColor=p.col;ctx.shadowBlur=6;
    ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(sx,sy,sz*a,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;ctx.globalAlpha=1;
  });
  drawWeapon();
  // Crosshair
  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.fillRect(W/2-8,H/2,6,1);ctx.fillRect(W/2+2,H/2,6,1);
  ctx.fillRect(W/2,H/2-8,1,6);ctx.fillRect(W/2,H/2+2,1,6);
  // Vignette
  const vg=ctx.createRadialGradient(W/2,H/2,W*0.25,W/2,H/2,W*0.65);
  vg.addColorStop(0,'rgba(0,0,0,0)');
  vg.addColorStop(1,'rgba(0,0,0,.4)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  // Low HP effect
  if(pl.alive&&pl.hp<=2){
    const intense=1-pl.hp/3;
    ctx.fillStyle=`rgba(255,0,0,${intense*0.06+Math.sin(state.time*0.08)*intense*0.025})`;
    ctx.fillRect(0,0,W,H);
  }
  // Damage flash
  if(pl.hurtTmr>0){
    ctx.fillStyle=`rgba(255,0,0,${pl.hurtTmr/20*0.15})`;
    ctx.fillRect(0,0,W,H);
  }
  drawMinimap();
  ctx.restore();
}

// === UPDATE ===
function update(){
  if(state.paused||state.gameOver)return;
  tick++;state.time++;
  if(pl.alive){
    // Jump
    if(pl.z>0||pl.zVel!==0){
      pl.z+=pl.zVel;pl.zVel-=GRAVITY;
      if(pl.z<0){pl.z=0;pl.zVel=0;pl.onGround=true;}
    }else pl.onGround=true;
    // Movement
    let mx=0,my=0;
    if(keys['w'])mx=1;
    if(keys['s'])mx=-1;
    if(keys['a'])my=-1;
    if(keys['d'])my=1;
    // Strafe
    if(my!==0||mx!==0){
      const len=Math.hypot(mx,my);
      mx/=len;my/=len;
      pl.bob+=0.08;
    }
    // Rotation
    if(keys['arrowleft']){pl.dir-=ROT_SPD;pl.planeX=Math.cos(pl.dir+Math.PI/2)*Math.tan(FOV/2);pl.planeY=Math.sin(pl.dir+Math.PI/2)*Math.tan(FOV/2);}
    if(keys['arrowright']){pl.dir+=ROT_SPD;pl.planeX=Math.cos(pl.dir+Math.PI/2)*Math.tan(FOV/2);pl.planeY=Math.sin(pl.dir+Math.PI/2)*Math.tan(FOV/2);}
    // Move forward/back
    const spd=MOVE_SPD*(keys['shift']?2:1);
    const fwd=pl.dir,bck=pl.dir+Math.PI;
    if(mx>0){
      const nx=pl.x+Math.cos(fwd)*spd,ny=pl.y+Math.sin(fwd)*spd;
      if(walkable(nx,pl.y))pl.x=nx;
      if(walkable(pl.x,ny))pl.y=ny;
    }
    if(mx<0){
      const nx=pl.x+Math.cos(bck)*spd,ny=pl.y+Math.sin(bck)*spd;
      if(walkable(nx,pl.y))pl.x=nx;
      if(walkable(pl.x,ny))pl.y=ny;
    }
    // Strafe
    const stL=pl.dir-Math.PI/2,stR=pl.dir+Math.PI/2;
    if(my<0){
      const nx=pl.x+Math.cos(stL)*spd*0.7,ny=pl.y+Math.sin(stL)*spd*0.7;
      if(walkable(nx,pl.y))pl.x=nx;
      if(walkable(pl.x,ny))pl.y=ny;
    }
    if(my>0){
      const nx=pl.x+Math.cos(stR)*spd*0.7,ny=pl.y+Math.sin(stR)*spd*0.7;
      if(walkable(nx,pl.y))pl.x=nx;
      if(walkable(pl.x,ny))pl.y=ny;
    }
    if(pl.iFrames>0)pl.iFrames--;
    if(pl.hurtTmr>0)pl.hurtTmr--;
    if(pl.slashTmr>0)pl.slashTmr--;
    // Pickups
    pickups.forEach(p=>{
      if(p.life>0&&dist(pl,p)<0.6){
        if(p.ty==='hp'&&pl.hp<pl.maxHp){
          pl.hp=Math.min(pl.maxHp,pl.hp+1);sndPickup();
          for(let i=0;i<4;i++)particles.push({x:p.x,y:p.y,vx:rand(-.02,.02),vy:rand(-.02,.02),life:10+rand(0,8),max:18,sz:2+rand(0,2),col:'#44ff88',ty:'hit'});
          updateUI();
        }
        p.life=0;
      }
    });
    pickups=pickups.filter(p=>p.life>0);
    if(state.comboTimer>0)state.comboTimer--;else state.combo=0;
  }
  // Enemy AI
  enemies.forEach(e=>{
    if(e.hp<=0)return;
    if(e.hurtTmr>0)e.hurtTmr--;
    if(e.attackAnim>0)e.attackAnim--;
    if(e.stunTmr>0){e.stunTmr--;return;}
    const d=dist(pl,e);
    if(d>25){e.hp=0;return;}
    const ang=Math.atan2(pl.y-e.y,pl.x-e.x);
    e.dir=ang;
    if(d>e.atkR){
      const sp=e.spd;
      const nx=e.x+Math.cos(ang)*sp,ny=e.y+Math.sin(ang)*sp;
      if(walkable(nx,ny)){e.x=nx;e.y=ny;}
    }
    if(e.atkTmr>0)e.atkTmr--;
    if(d<=e.atkR+0.3&&e.atkTmr===0&&pl.alive){
      e.atkTmr=e.atkCd;
      e.attackAnim=10;
      if(Math.random()<.6&&d<e.atkR+0.2)playerHit(e.atkDmg);
    }
  });
  enemies=enemies.filter(e=>e.hp>0);
  // Spawning
  state.spawnTimer--;
  if(state.spawnTimer<=0&&pl.alive){
    const base=Math.max(25,ENEMY_BASE_SPAWN-state.difficulty*8);
    state.spawnTimer=base+randInt(0,30);
    const count=1+Math.floor(state.difficulty/4);
    for(let i=0;i<Math.min(count,3);i++)spawnEnemy();
    if(tick%500===0)state.difficulty+=0.3;
    if(tick%1500===0)state.wave++;
  }
  // Particles
  particles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.ty==='die'){p.vx*=0.97;p.vy*=0.97;p.vy+=0.001;}
    else if(p.ty==='hit'){p.vx*=0.94;p.vy*=0.94;}
    else if(p.ty==='swing'){p.vy+=0.2;p.life-=2;}
    p.life--;
  });
  particles=particles.filter(p=>p.life>0);
  if(tick%4===0)updateUI();
}

// === INIT ===
function initGame(){
  genMap();
  Object.assign(pl,{
    x:MAP_W/2,y:MAP_H/2,dir:-Math.PI/2,z:0,zVel:0,onGround:true,
    hp:MAX_HP,maxHp:MAX_HP,
    slashTmr:0,slashType:null,
    hurtTmr:0,iFrames:0,bob:0,alive:true
  });
  pl.planeX=Math.cos(pl.dir+Math.PI/2)*Math.tan(FOV/2);
  pl.planeY=Math.sin(pl.dir+Math.PI/2)*Math.tan(FOV/2);
  enemies=[];particles=[];pickups=[];
  state.score=0;state.combo=0;state.comboTimer=0;
  state.spawnTimer=60;state.difficulty=1;state.totalKills=0;state.wave=1;
  state.time=0;state.gameOver=false;state.retired=false;
  state.paused=false;state.enemyTypes={ronin:0,samurai:0,ninja:0};
  tick=0;
  document.getElementById('gameOverOverlay').classList.remove('show');
  document.getElementById('pauseOverlay').classList.remove('show');
  document.getElementById('comboDisp').classList.remove('show');
  deleteSave();updateUI();
}

// === MAIN LOOP ===
function loop(){
  if(!state.paused&&!state.gameOver)update();
  render();
  requestAnimationFrame(loop);
}

function _tgen() {
  var num = Math.floor(Math.random() * 8) + 1;
  var out = [];
  for (var i = 0; i < num; i++) { out.push(lex[Math.floor(Math.random() * lex.length)]); }
  return out.join('  ');
}
const _nano={lines:[],max:3};
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.activeElement!==document.getElementById('termIn')){
    const line=_tgen();
    _nano.lines.push(line);
    if(_nano.lines.length>_nano.max)_nano.lines.shift();
    const el=document.getElementById('nanoDisp');
    if(el&&_nano.lines.length>0){
      el.innerHTML=_nano.lines.join('\n');
      el.classList.add('show');
    }
    e.preventDefault();return;
  }
});

// === INPUT ===
document.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  keys[k]=true;
  if(e.key==='ArrowLeft')keys['arrowleft']=true;
  if(e.key==='ArrowRight')keys['arrowright']=true;
  if(e.key==='ArrowUp')keys['arrowup']=true;
  if(e.key==='ArrowDown')keys['arrowdown']=true;
  if(k==='escape'){
    if(state.gameOver)return;
    state.paused=!state.paused;
    document.getElementById('pauseOverlay').classList.toggle('show',state.paused);
    if(state.paused)saveState();
    e.preventDefault();return;
  }
  if(k==='r'){
    if(state.gameOver){initGame();e.preventDefault();return;}
    if(pl.alive&&!state.paused){gameOver(true);e.preventDefault();return;}
  }
  if(state.paused||state.gameOver)return;
  if(k==='q'){doSlash('q');e.preventDefault();}
  if(k==='e'){doSlash('e');e.preventDefault();}
  if(k===' '){
    if(pl.onGround&&pl.alive){
      pl.zVel=JUMP_VEL;pl.onGround=false;sndJump();
      e.preventDefault();
    }
  }
  e.preventDefault();
});
document.addEventListener('keyup',e=>{
  const k=e.key.toLowerCase();keys[k]=false;
  if(e.key==='ArrowLeft')keys['arrowleft']=false;
  if(e.key==='ArrowRight')keys['arrowright']=false;
});
canvas.addEventListener('contextmenu',e=>e.preventDefault());

// === SOUNDS ===
var _actx=null;
function _p(f,d,t,g,s){try{if(!_actx)_actx=new(window.AudioContext||window.webkitAudioContext)();var o=_actx.createOscillator(),n=_actx.createGain();o.type=t||'sawtooth';o.frequency.value=f;n.gain.setValueAtTime(g||0.15,_actx.currentTime);n.gain.exponentialRampToValueAtTime(0.001,_actx.currentTime+(d||0.2));if(s)o.frequency.linearRampToValueAtTime(s,_actx.currentTime+(d||0.2));o.connect(n);n.connect(_actx.destination);o.start();o.stop(_actx.currentTime+(d||0.2));}catch(e){}}
function _n(d,g){try{if(!_actx)_actx=new(window.AudioContext||window.webkitAudioContext)();var b=_actx.createBuffer(1,_actx.sampleRate*0.2,_actx.sampleRate),w=b.getChannelData(0);for(var i=0;i<w.length;i++)w[i]=Math.random()*2-1;var s=_actx.createBufferSource(),n=_actx.createGain();s.buffer=b;n.gain.setValueAtTime(g||0.1,_actx.currentTime);n.gain.exponentialRampToValueAtTime(0.001,_actx.currentTime+(d||0.1));s.connect(n);n.connect(_actx.destination);s.start();}catch(e){}}
function sndSlash(){_p(200,0.08,'sawtooth',0.2,80);setTimeout(function(){_p(400,0.1,'sawtooth',0.15,100);},30);}
function sndHit(){_n(0.06,0.2);_p(300,0.05,'square',0.1,150);}
function sndKill(){_p(800,0.05,'sine',0.15,200);setTimeout(function(){_p(600,0.08,'sine',0.12,150);},50);setTimeout(function(){_p(400,0.12,'sine',0.1,100);},100);}
function sndHurt(){_p(100,0.15,'sawtooth',0.2,40);_n(0.08,0.15);}
function sndJump(){_p(200,0.06,'sine',0.1,500);setTimeout(function(){_p(300,0.05,'sine',0.08,400);},40);}
function sndPickup(){_p(600,0.06,'sine',0.12,900);setTimeout(function(){_p(900,0.08,'sine',0.1,1200);},60);}

if(saved){
  map=[];for(let y=0;y<MAP_H;y++){map[y]=[];for(let x=0;x<MAP_W;x++)map[y][x]=0;}
  const loaded=loadState();
  if(!loaded)initGame();
}else{

}

// === MOBILE TOUCH CONTROLS ===
if('ontouchstart' in window){
(function(){
function kd(k){document.dispatchEvent(new KeyboardEvent('keydown',{key:k,bubbles:true}))}
function ku(k){document.dispatchEvent(new KeyboardEvent('keyup',{key:k,bubbles:true}))}
function t(el,k){
  if(!el)return;
  var active=false;
  el.addEventListener('touchstart',function(e){e.preventDefault();if(!active){active=true;kd(k)}},{passive:false});
  el.addEventListener('touchend',function(e){e.preventDefault();if(active){active=false;ku(k)}},{passive:false});
  el.addEventListener('touchcancel',function(){if(active){active=false;ku(k)}});
}
// D-pad movement
t(document.getElementById('mc-up'),'w');
t(document.getElementById('mc-down'),'s');
t(document.getElementById('mc-left'),'a');
t(document.getElementById('mc-right'),'d');
// Turning
t(document.getElementById('mc-tl'),'ArrowLeft');
t(document.getElementById('mc-tr'),'ArrowRight');
// Combat attacks (hold-release to match keyboard behavior)
t(document.getElementById('mc-q-attack'),'q');
t(document.getElementById('mc-e-attack'),'e');
// Sprint (hold to run)
t(document.getElementById('mc-run'),'Shift');
// Jump - one-shot on touch
var mcJump=document.getElementById('mc-jump');
if(mcJump)mcJump.addEventListener('touchstart',function(e){e.preventDefault();kd(' ')},{passive:false});
// Pause - one-shot toggle
var mcPause=document.getElementById('mc-pause');
if(mcPause)mcPause.addEventListener('touchstart',function(e){e.preventDefault();kd('Escape')},{passive:false});
// Restart/Retire - one-shot
var mcRestart=document.getElementById('mc-restart');
if(mcRestart)mcRestart.addEventListener('touchstart',function(e){e.preventDefault();kd('r')},{passive:false});
// Nano - one-shot
var mcNano=document.getElementById('mc-nano');
if(mcNano)mcNano.addEventListener('touchstart',function(e){e.preventDefault();kd('Enter')},{passive:false});
// Toggle controls visibility
var tg=document.getElementById('mc-toggle'),mc=document.getElementById('mobile-controls');
if(tg&&mc){
  var hidden=false;
  tg.addEventListener('touchstart',function(e){
    e.preventDefault();
    hidden=!hidden;
    mc.querySelectorAll('.mc-btn,#mc-nano,#mc-restart').forEach(function(b){b.style.display=hidden?'none':'';});
    tg.textContent=hidden?'▶':'⌨';
  },{passive:false});
}
})();
